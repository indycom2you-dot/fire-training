<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนอบรมประกันอัคคีภัย</title>
    <!-- Tailwind CSS สำหรับความสวยงาม -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
        .red-gradient { background: linear-gradient(135deg, #ef4444 0%, #991b1b 100%); }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDK (Version Compat - เสถียรที่สุดสำหรับไฟล์เดียว) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        // --- ส่วนที่ 1: รหัสเชื่อมต่อ FIREBASE ของคุณอภิชิต ---
        const firebaseConfig = {
            apiKey: "AIzaSyC9-6NepYeoyU4-pluImdIcNBV6H7ThLas",
            authDomain: "ppp-registration.firebaseapp.com",
            projectId: "ppp-registration",
            storageBucket: "ppp-registration.firebasestorage.app",
            messagingSenderId: "1072711188640",
            appId: "1:1072711188640:web:e639ef36b32ea637ab09c5",
            measurementId: "G-Z0XFPK8CJ7"
        };

        const App = () => {
            const [view, setView] = React.useState('form');
            const [submitted, setSubmitted] = React.useState(false);
            const [loading, setLoading] = React.useState(false);
            const [records, setRecords] = React.useState([]);
            const [error, setError] = React.useState(null);
            const [formData, setFormData] = React.useState({
                name: '', company: '', phone: '', attendance: 'เข้าร่วม'
            });

            // ใช้ appId ตามมาตรฐานระบบ
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'ppp-registration';

            React.useEffect(() => {
                const initFirebase = async () => {
                    try {
                        if (!firebase.apps.length) {
                            firebase.initializeApp(firebaseConfig);
                        }
                        const db = firebase.firestore();
                        const auth = firebase.auth();

                        // ขั้นตอนที่ 1: ล็อกอิน (Rule 3: Auth Before Queries)
                        await auth.signInAnonymously();
                        
                        // ขั้นตอนที่ 2: ตั้งค่า Path (Rule 1: Strict Paths)
                        const registrationsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('registrations');
                        
                        // ขั้นตอนที่ 3: ดึงข้อมูล (Rule 2: No Complex Queries)
                        const unsubscribe = registrationsRef.onSnapshot((snapshot) => {
                            const items = snapshot.docs.map(doc => ({
                                id: doc.id,
                                ...doc.data()
                            }));
                            // กรองและเรียงลำดับใน Javascript Memory (Rule 2)
                            items.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                            setRecords(items);
                        }, (err) => {
                            console.error("Firestore Error:", err);
                            if (err.code === 'permission-denied') {
                                setError("permission-denied");
                            } else {
                                setError("เกิดข้อผิดพลาดในการเข้าถึงข้อมูล: " + err.message);
                            }
                        });
                        
                        return () => unsubscribe();
                    } catch (err) {
                        console.error("Initialization Error:", err);
                        if (err.code === 'auth/configuration-not-found') {
                            setError("auth-config-error");
                        } else {
                            setError("ระบบขัดข้อง: " + err.message);
                        }
                    }
                };

                initFirebase();
            }, []);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (loading || error) return;
                setLoading(true);
                try {
                    const db = firebase.firestore();
                    const registrationsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('registrations');
                    
                    await registrationsRef.add({
                        ...formData,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setSubmitted(true);
                    setFormData({ name: '', company: '', phone: '', attendance: 'เข้าร่วม' });
                } catch (err) {
                    console.error("Submit Error:", err);
                    if (err.code === 'permission-denied') {
                        setError("permission-denied");
                    } else {
                        alert("ลงทะเบียนไม่สำเร็จ: " + err.message);
                    }
                }
                setLoading(false);
            };

            const exportToCSV = () => {
                const headers = ["ชื่อ-นามสกุล", "บริษัท", "เบอร์โทร", "สถานะ", "วันที่"];
                const rows = records.map(r => [
                    `"${r.name}"`, `"${r.company}"`, `"${r.phone}"`, `"${r.attendance}"`,
                    `"${r.createdAt?.toDate().toLocaleString('th-TH')}"`
                ]);
                const csvContent = "\uFEFF" + [headers, ...rows].map(e => e.join(",")).join("\n");
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `รายชื่อลงทะเบียน.csv`;
                link.click();
            };

            // แสดงหน้าจอแนะนำการแก้ไข Rules
            if (error === "permission-denied") {
                return (
                    <div className="flex items-center justify-center min-h-screen p-4 bg-slate-50">
                        <div className="bg-white p-8 rounded-3xl shadow-2xl border-t-8 border-orange-500 max-w-2xl w-full">
                            <h2 className="text-2xl font-bold text-orange-600 mb-6 flex items-center gap-3">
                                <span>🔒</span> ขั้นตอนสุดท้าย: ปลดล็อกฐานข้อมูล
                            </h2>
                            <p className="text-slate-800 font-bold mb-4 underline">คุณอภิชิตต้องทำขั้นตอนนี้เพื่อให้ระบบบันทึกข้อมูลได้ครับ:</p>
                            <ol className="list-decimal ml-5 space-y-4 text-slate-600 text-sm mb-8">
                                <li>เปิดหน้า <a href="https://console.firebase.google.com/" target="_blank" className="text-blue-600 font-bold underline">Firebase Console</a></li>
                                <li>ไปที่เมนู <strong>Build</strong> > <strong>Firestore Database</strong> (เมนูแถบซ้าย)</li>
                                <li>คลิกที่แท็บ <strong>Rules</strong> (ด้านบนถัดจาก Data)</li>
                                <li>ลบข้อความในช่องสีดำออกให้หมด แล้วคัดลอกรหัสข้างล่างนี้ไปวางแทน:</li>
                            </ol>
                            
                            <div className="bg-slate-900 text-green-400 p-6 rounded-2xl font-mono text-xs mb-8 overflow-x-auto border-2 border-slate-700">
                                <pre>{`rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /{document=**} {
      allow read, write: if true;
    }
  }
}`}</pre>
                            </div>
                            
                            <div className="bg-blue-50 p-4 rounded-xl text-blue-800 text-sm mb-8 border border-blue-100 flex items-start gap-3">
                                <span className="text-lg">💡</span>
                                <p><strong>สำคัญ:</strong> เมื่อวางเสร็จแล้ว ต้องกดปุ่ม <strong>"Publish"</strong> สีฟ้าที่มุมขวาบนด้วยนะครับ</p>
                            </div>
                            
                            <button onClick={() => window.location.reload()} className="w-full py-5 bg-orange-500 hover:bg-orange-600 text-white rounded-2xl font-bold shadow-xl shadow-orange-100 transition-all active:scale-95">
                                ผมกด Publish เรียบร้อยแล้ว ลองใช้งานอีกครั้ง
                            </button>
                        </div>
                    </div>
                );
            }

            if (error === "auth-config-error") {
                return (
                    <div className="flex items-center justify-center min-h-screen p-4 bg-slate-50">
                        <div className="bg-white p-8 rounded-3xl shadow-2xl border-t-8 border-red-500 max-w-lg w-full">
                            <h2 className="text-2xl font-bold text-red-600 mb-6">⚠️ เปิดใช้งานระบบล็อกอิน</h2>
                            <p className="text-slate-700 mb-6 font-bold">กรุณาไปที่ Firebase > Authentication > Sign-in method > เปิดใช้งาน <strong>Anonymous</strong> แล้วกด Save ครับ</p>
                            <button onClick={() => window.location.reload()} className="w-full py-4 bg-red-600 text-white rounded-2xl font-bold">ตั้งค่าเสร็จแล้ว ลองใหม่</button>
                        </div>
                    </div>
                );
            }

            if (view === 'admin') {
                return (
                    <div className="p-4 md:p-8 max-w-5xl mx-auto">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
                            <div>
                                <h1 className="text-2xl font-bold text-slate-800">รายชื่อผู้ลงทะเบียน ({records.length})</h1>
                            </div>
                            <div className="flex gap-2 w-full md:w-auto">
                                <button onClick={exportToCSV} className="flex-1 md:flex-none bg-green-600 text-white px-6 py-2.5 rounded-xl font-bold shadow-md">โหลด Excel</button>
                                <button onClick={() => setView('form')} className="flex-1 md:flex-none bg-white border border-slate-200 text-slate-600 px-6 py-2.5 rounded-xl font-bold">กลับหน้าฟอร์ม</button>
                            </div>
                        </div>
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                            <div className="overflow-x-auto">
                                <table className="w-full text-left">
                                    <thead className="bg-slate-50 border-b border-slate-100">
                                        <tr>
                                            <th className="px-6 py-4 text-xs font-bold text-slate-400 uppercase">ชื่อ / บริษัท</th>
                                            <th className="px-6 py-4 text-xs font-bold text-slate-400 uppercase">เบอร์โทร</th>
                                            <th className="px-6 py-4 text-xs font-bold text-slate-400 uppercase">สถานะ</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-50">
                                        {records.map(item => (
                                            <tr key={item.id} className="hover:bg-slate-50">
                                                <td className="px-6 py-4">
                                                    <div className="font-bold text-slate-800">{item.name}</div>
                                                    <div className="text-xs text-slate-400">{item.company}</div>
                                                </td>
                                                <td className="px-6 py-4 text-slate-600 text-sm">{item.phone}</td>
                                                <td className="px-6 py-4">
                                                    <span className={`px-2 py-0.5 rounded text-[10px] font-bold ${item.attendance === 'เข้าร่วม' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                                        {item.attendance}
                                                    </span>
                                                </td>
                                            </tr>
                                        ))}
                                        {records.length === 0 && (
                                            <tr><td colSpan="3" className="p-10 text-center text-slate-400 text-sm">ยังไม่มีข้อมูลผู้ลงทะเบียน</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex items-center justify-center p-4 pt-10 md:pt-20">
                    <div className="w-full max-w-md">
                        {submitted ? (
                            <div className="bg-white p-10 rounded-3xl shadow-xl text-center border border-slate-100">
                                <div className="text-5xl mb-6">🎉</div>
                                <h2 className="text-2xl font-bold mb-2 text-slate-800">ลงทะเบียนสำเร็จ</h2>
                                <p className="text-slate-500 mb-8 leading-relaxed">ข้อมูลของคุณถูกบันทึกเรียบร้อยแล้ว<br/>ขอบคุณที่สนใจเข้าร่วมอบรมครับ</p>
                                <button onClick={() => setSubmitted(false)} className="w-full py-4 bg-red-600 hover:bg-red-700 text-white rounded-2xl font-bold shadow-lg transition-all active:scale-95">ลงทะเบียนท่านอื่นเพิ่ม</button>
                            </div>
                        ) : (
                            <div className="bg-white p-8 rounded-3xl shadow-xl border border-slate-100 overflow-hidden relative">
                                <div className="mb-8 text-center">
                                    <h1 className="text-xl font-bold text-slate-800 mb-2">ลงทะเบียนอบรม</h1>
                                    <p className="text-sm text-red-600 font-bold leading-relaxed underline">"เข้าร่วมอบรมให้ความรู้ประกันอัคคีภัยบ้านอยู่อาศัย"</p>
                                </div>
                                <form onSubmit={handleSubmit} className="space-y-4">
                                    <div className="space-y-1">
                                        <label className="text-xs font-bold text-slate-500 ml-1">ชื่อ - นามสกุล</label>
                                        <input type="text" required placeholder="ชื่อจริง-นามสกุล" className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-red-500 outline-none transition-all" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-xs font-bold text-slate-500 ml-1">บริษัท / หน่วยงาน</label>
                                        <input type="text" required placeholder="ชื่อบริษัท" className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-red-500 outline-none transition-all" value={formData.company} onChange={e => setFormData({...formData, company: e.target.value})} />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-xs font-bold text-slate-500 ml-1">เบอร์โทรศัพท์</label>
                                        <input type="tel" required placeholder="08X-XXX-XXXX" className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-red-500 outline-none transition-all" value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} />
                                    </div>
                                    <div className="space-y-2 pt-2">
                                        <label className="text-xs font-bold text-slate-500 ml-1">ความประสงค์</label>
                                        <div className="grid grid-cols-2 gap-3">
                                            <button type="button" onClick={() => setFormData({...formData, attendance: 'เข้าร่วม'})} className={`py-3 rounded-xl font-bold border-2 transition-all ${formData.attendance === 'เข้าร่วม' ? 'bg-red-600 border-red-600 text-white shadow-md' : 'bg-white border-slate-100 text-slate-400'}`}>เข้าร่วม</button>
                                            <button type="button" onClick={() => setFormData({...formData, attendance: 'ไม่เข้าร่วม'})} className={`py-3 rounded-xl font-bold border-2 transition-all ${formData.attendance === 'ไม่เข้าร่วม' ? 'bg-slate-800 border-slate-800 text-white shadow-md' : 'bg-white border-slate-100 text-slate-400'}`}>ไม่เข้าร่วม</button>
                                        </div>
                                    </div>
                                    <button type="submit" disabled={loading} className="w-full py-4 bg-red-600 text-white rounded-2xl font-bold shadow-lg hover:bg-red-700 transition-all mt-4 flex justify-center items-center">
                                        {loading ? <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : "ยืนยันลงทะเบียน"}
                                    </button>
                                </form>
                                <button onClick={() => setView('admin')} className="w-full mt-10 text-slate-300 text-[10px] uppercase tracking-widest hover:text-slate-500 transition-colors">Admin Dashboard</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
