                setErrorMsg('');

                    const db = firebase.firestore();

                        setErrorMsg('เบอร์โทรศัพท์นี้ถูกใช้ลงทะเบียนไปแล้วครับ');
                        setLoading(false); return;
                    }

                        ...formData,
                        name: formData.name.trim(),
                        company: formData.company.trim(),
                        phone: formData.phone.trim(),
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()

                    setFormData({ name: '', nickname: '', company: '', email: '', phone: '', attendance: 'เข้าร่วม', foodMenu: '', acceptedTerms: false });

                                                <div className="hidden md:flex items-center gap-2 mt-2 sm:mt-0">
                                                    <button onClick={slideLeft} className="w-8 h-8 rounded-full bg-white border border-slate-200 hover:bg-slate-100 text-slate-700 font-black flex items-center justify-center shadow-sm">←</button>
                                                    <button onClick={slideRight} className="w-8 h-8 rounded-full bg-white border border-slate-200 hover:bg-slate-100 text-slate-700 font-black flex items-center justify-center shadow-sm">→</button>
                                                </div>
                                            </div>
                                            <div ref={scrollRef} className="flex gap-4 overflow-x-auto pb-4 snap-x hide-scroll scroll-smooth">
                                                {["77775555.png", "1778246840708.jpg", "1778246828831.jpg", "1778246833650.jpg", "1778246831082.jpg", "1778246825179.jpg"].map((img, idx) => (
                                                    <img 
                                                        key={idx} 
                                                        src={`https://raw.githubusercontent.com/indycom2you-dot/fire-training/main/${img}`} 
                                                        className="h-56 md:h-64 w-auto object-cover rounded-2xl shadow-md snap-center border border-slate-200 shrink-0 cursor-zoom-in hover:opacity-90 transition-opacity" 
                                                        alt="เมนู" 
                                                        onClick={(e) => setEnlargedImage(e.target.src)}
                                                    />
                                                ))}
                                            </div>
                                        </div>
                                        <hr className="border-slate-200" />
                                        <div>
                                            <div className="flex items-center gap-2 mb-3 mt-4">
                                                <h4 className="font-black text-slate-800 text-base">🍰 หมวดเบเกอรี่ (เลือก 1 อย่าง)</h4>
                                            </div>
                                            <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                                                {menuData.desserts.map((item, idx) => {
                                                    const isSelected = tempDessert === item.name;
                                                    return (
                                                        <button 
                                                            key={idx} type="button" onClick={() => setTempDessert(isSelected ? '' : item.name)}
                                                            className={`p-2 pb-3 text-sm font-bold text-center rounded-2xl border-2 transition-all relative overflow-hidden flex flex-col items-center gap-2 ${isSelected ? 'bg-orange-50 border-orange-500 text-orange-700 shadow-md scale-[1.02]' : 'bg-white border-slate-100 text-slate-600 hover:border-orange-300'}`}
                                                        >
                                                            {isSelected && <span className="absolute top-2 right-2 bg-orange-500 text-white w-5 h-5 flex items-center justify-center rounded-full text-[10px] z-10 shadow-sm">✓</span>}
                                                            <div className="w-full h-24 bg-slate-100 rounded-xl overflow-hidden relative">
                                                                <img src={item.img} alt={item.name} className="w-full h-full object-cover" />
                                                                {isSelected && <div className="absolute inset-0 bg-orange-500/20"></div>}
                                                            </div>
                                                            <span className="leading-tight mt-1">{item.name}</span>
                                                        </button>
                                                    )
                                                })}
                                            </div>
                                        </div>
                                        {Object.entries(menuData.drinks).map(([categoryName, items], catIdx) => (
                                            <div key={catIdx}>
                                                <div className="flex items-center gap-2 mb-3 mt-4">
                                                    <h4 className="font-black text-slate-800 text-base">{categoryName}</h4>
                                                    {catIdx === 0 && <span className="text-[10px] font-bold text-slate-400 bg-slate-200 px-2 py-0.5 rounded-full">เลือก 1 อย่าง</span>}
                                                </div>
                                                <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                                                    {items.map((item, idx) => {
                                                        const isSelected = tempDrink === item;
                                                        const imgSrc = getDrinkImage(categoryName); 
                                                        return (
                                                            <button 
                                                                key={idx} type="button" onClick={() => setTempDrink(isSelected ? '' : item)}
                                                                className={`p-2 pb-3 text-sm font-bold text-center rounded-2xl border-2 transition-all relative overflow-hidden flex flex-col items-center gap-2 ${isSelected ? 'bg-emerald-50 border-emerald-500 text-emerald-700 shadow-md scale-[1.02]' : 'bg-white border-slate-100 text-slate-600 hover:border-emerald-300'}`}
                                                            >
                                                                {isSelected && <span className="absolute top-2 right-2 bg-emerald-500 text-white w-5 h-5 flex items-center justify-center rounded-full text-[10px] z-10 shadow-sm">✓</span>}
                                                                <div className="w-full h-24 bg-slate-100 rounded-xl overflow-hidden relative">
                                                                    <img src={imgSrc} alt={item} className="w-full h-full object-cover" />
                                                                    {isSelected && <div className="absolute inset-0 bg-emerald-500/20"></div>}
                                                                </div>
                                                                <span className="leading-tight mt-1">{item}</span>
                                                            </button>
                                                        )
                                                    })}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="p-4 bg-white border-t shadow-[0_-10px_20px_rgba(0,0,0,0.05)] md:rounded-b-3xl shrink-0 z-20">
                                        <div className="mb-3 p-3 bg-slate-50 rounded-xl border border-slate-100 flex flex-col gap-1.5">
                                            <div className="flex justify-between items-center text-sm">
                                                <span className="font-bold text-slate-500">ขนมที่เลือก:</span>
                                                <span className="font-black text-orange-600 truncate max-w-[150px] text-right">{tempDessert || '- ยังไม่เลือก -'}</span>
                                            </div>
                                            <div className="flex justify-between items-center text-sm">
                                                <span className="font-bold text-slate-500">เครื่องดื่มที่เลือก:</span>
                                                <span className="font-black text-emerald-600 truncate max-w-[150px] text-right">{tempDrink || '- ยังไม่เลือก -'}</span>
                                            </div>
                                        </div>
                                        <button 
                                            type="button"
                                            onClick={confirmMenuSelection} 
                                            className={`w-full py-4 rounded-xl font-bold transition-colors shadow-lg active:scale-95 text-white ${(tempDessert || tempDrink) ? 'bg-slate-900 hover:bg-slate-800' : 'bg-slate-300'}`}
                                        >
                                            ยืนยันเมนูอาหาร
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="max-w-md w-full bg-white rounded-[32px] shadow-2xl overflow-hidden p-6 md:p-8 animate-in slide-in-from-right-4 duration-300 relative z-10">
                            <button onClick={() => setView('landing')} className="text-sm font-bold text-slate-400 hover:text-slate-600 mb-6 flex items-center gap-1 transition-colors">← ย้อนกลับ</button>
                            <div className="text-center mb-8">
                                <h2 className="text-2xl font-black text-slate-800 mb-1">ลงทะเบียนอบรม</h2>
                                <p className="text-red-600 font-bold text-[15px]">"ประกันรถยนต์ 2+ คุ้มค่า จัดเต็ม"</p>
                                <p className="text-[11px] text-slate-400 mt-4 font-bold tracking-widest border-t pt-4 border-slate-50 uppercase">จัดทำโดย บริษัท พีพีพี อินชัวรันส์ โบรคเกอร์ จำกัด</p>
                            </div>
                            
                            <form onSubmit={handleSubmit} className="space-y-4">
                                <input type="text" placeholder="ชื่อ - นามสกุล *" className="w-full px-5 py-3.5 rounded-xl border border-slate-200 bg-slate-50 outline-none focus:bg-white focus:ring-2 focus:ring-red-500 transition-all font-medium text-slate-700" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                                <input type="text" placeholder="ชื่อเล่น (ถ้ามี)" className="w-full px-5 py-3.5 rounded-xl border border-slate-200 bg-slate-50 outline-none focus:bg-white focus:ring-2 focus:ring-red-500 transition-all font-medium text-slate-700" value={formData.nickname} onChange={e => setFormData({...formData, nickname: e.target.value})} />
                                <input type="text" placeholder="บริษัท / หน่วยงาน *" className="w-full px-5 py-3.5 rounded-xl border border-slate-200 bg-slate-50 outline-none focus:bg-white focus:ring-2 focus:ring-red-500 transition-all font-medium text-slate-700" value={formData.company} onChange={e => setFormData({...formData, company: e.target.value})} />
                                <input type="email" placeholder="อีเมล (ถ้ามี)" className="w-full px-5 py-3.5 rounded-xl border border-slate-200 bg-slate-50 outline-none focus:bg-white focus:ring-2 focus:ring-red-500 transition-all font-medium text-slate-700" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} />
                                <input type="tel" placeholder="เบอร์โทรศัพท์ *" className="w-full px-5 py-3.5 rounded-xl border border-slate-200 bg-slate-50 outline-none focus:bg-white focus:ring-2 focus:ring-red-500 transition-all font-medium text-slate-700" value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} />
                                
                                <div className="bg-slate-50 p-1.5 rounded-2xl flex border border-slate-200 mt-4">
                                    <button type="button" onClick={() => setFormData({...formData, attendance: 'เข้าร่วม'})} className={`flex-1 py-3 rounded-xl font-bold text-sm transition-all ${formData.attendance === 'เข้าร่วม' ? 'bg-white text-red-600 shadow-sm border border-slate-200' : 'text-slate-500 hover:text-slate-700'}`}>เข้าร่วม</button>
                                    <button type="button" onClick={() => setFormData({...formData, attendance: 'ไม่เข้าร่วม', foodMenu: '', acceptedTerms: false})} className={`flex-1 py-3 rounded-xl font-bold text-sm transition-all ${formData.attendance === 'ไม่เข้าร่วม' ? 'bg-white text-slate-700 shadow-sm border border-slate-200' : 'text-slate-500 hover:text-slate-700'}`}>ไม่เข้าร่วม</button>
                                </div>

                                {formData.attendance === 'เข้าร่วม' && (
                                    <div className="space-y-4 animate-in fade-in pt-4 border-t border-slate-100 mt-4">
                                        <div className="bg-orange-50/50 p-4 rounded-2xl border border-orange-100">
                                            <label className="block text-sm font-bold text-slate-800 mb-3">🍽️ ระบุเมนู ขนม และ เครื่องดื่ม ที่ต้องการ <span className="text-red-500">*</span></label>
                                            <button 
                                                type="button"
                                                onClick={() => {
                                                    if(formData.foodMenu.includes('+')) {
                                                        const parts = formData.foodMenu.split('+').map(p=>p.trim());
                                                        setTempDessert(parts[0] || ''); setTempDrink(parts[1] || '');
                                                    } else { setTempDessert(''); setTempDrink(''); }
                                                    setIsMenuSelectorOpen(true);
                                                }}
                                                className="w-full py-4 mb-3 bg-gradient-to-r from-orange-400 to-amber-500 text-white rounded-xl font-bold shadow-md hover:shadow-lg hover:from-orange-500 hover:to-amber-600 transition-all flex items-center justify-center gap-2"
                                            >
                                                <span className="text-lg">👆</span> คลิกเพื่อเลือกเมนูจากร้าน
                                            </button>
                                            <input 
                                                type="text" 
                                                placeholder="หรือพิมพ์เมนูเองที่นี่..." 
                                                className="w-full px-5 py-3.5 rounded-xl border border-slate-200 bg-white focus:ring-2 focus:ring-orange-400 outline-none transition-all font-bold text-slate-800 text-sm" 
                                                value={formData.foodMenu} 
                                                onChange={e => setFormData({...formData, foodMenu: e.target.value})} 
                                            />
                                            {formData.foodMenu && (
                                                <p className="text-[11px] text-emerald-600 font-bold mt-2 flex items-center gap-1">✅ รับทราบเมนูที่เลือกแล้ว</p>
                                            )}
                                        </div>

                                        <div className="bg-red-50 p-5 rounded-2xl border border-red-100 relative overflow-hidden">
                                            <div className="absolute top-0 right-0 w-16 h-16 bg-red-100 rounded-bl-full -mr-4 -mt-4 z-0"></div>
                                            <p className="text-[13px] font-bold text-red-600 mb-1 relative z-10 flex items-center gap-1">
                                                <span className="text-base">📌</span> หมายเหตุสำคัญ
                                            </p>
                                            <p className="text-sm text-slate-700 leading-relaxed mb-4 relative z-10">
                                                หากลงทะเบียนยืนยันเข้าร่วมแล้ว ไม่มา <span className="font-bold text-red-600">ขอสงวนสิทธิ์เก็บเงิน 300 บาท</span> <br/>
                                                <span className="text-xs text-slate-500">(ค่าสั่งอาหารและเครื่องดื่มล่วงหน้า)</span>
                                            </p>
                                            
                                            <label className="flex items-start gap-3 cursor-pointer group relative z-10">
                                                <div className="relative flex items-center justify-center mt-0.5">
                                                    <input 
                                                        type="checkbox" 
                                                        className="w-5 h-5 appearance-none border-2 border-slate-300 rounded-md checked:bg-red-600 checked:border-red-600 transition-colors cursor-pointer"
                                                        checked={formData.acceptedTerms}
                                                        onChange={(e) => setFormData({...formData, acceptedTerms: e.target.checked})}
                                                    />
                                                    {formData.acceptedTerms && <span className="absolute text-white pointer-events-none text-xs">✓</span>}
                                                </div>
                                                <span className="text-sm font-bold text-slate-800 group-hover:text-red-600 transition-colors">รับทราบและยอมรับเงื่อนไข</span>
                                            </label>
                                        </div>
                                    </div>
                                )}
                                <button type="submit" disabled={loading} className="w-full py-4.5 bg-[#dc2626] text-white rounded-[20px] font-black text-[16px] shadow-xl shadow-red-600/20 hover:bg-red-700 hover:-translate-y-0.5 transition-all mt-6 flex justify-center items-center h-14">
                                    {loading ? <div className="w-6 h-6 border-3 border-white/30 border-t-white rounded-full animate-spin"></div> : "ยืนยันการลงทะเบียน"}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            if (view === 'success') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="max-w-md w-full bg-white p-10 rounded-[32px] shadow-2xl text-center animate-in zoom-in duration-300">
                            <div className="text-6xl mb-6">✅</div>
                            <h2 className="text-2xl font-black mb-2 text-slate-800">บันทึกเรียบร้อย</h2>
                            <p className="text-slate-500 mb-8 font-medium">ระบบได้รับข้อมูลการลงทะเบียนของคุณแล้ว ขอบคุณครับ</p>
                            <button onClick={() => { setView('landing'); setSubmitted(false); }} className="w-full py-4 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl font-bold transition-all">กลับหน้าแรก</button>
                        </div>
                    </div>
                );
            }

            if (view === 'login') {
                return (
                    <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4">
                        <div className="w-full max-w-sm bg-white p-8 rounded-[32px] shadow-2xl">
                            <div className="w-16 h-16 bg-red-50 text-red-600 rounded-2xl flex items-center justify-center mx-auto mb-6 text-2xl">🔐</div>
                            <h2 className="text-2xl font-bold mb-6 text-center text-slate-800">Admin Login</h2>
                            {errorMsg && <div className="mb-4 p-3 bg-red-50 text-red-600 rounded-xl text-sm font-bold text-center">{errorMsg}</div>}
                            <form onSubmit={handleAdminLogin} className="space-y-4 text-left">
                                <input type="text" placeholder="Username" required className="w-full px-5 py-4 rounded-xl border border-slate-200 outline-none focus:border-red-500 bg-slate-50 font-medium" value={username} onChange={e => setUsername(e.target.value)} />
                                <input type="password" placeholder="Password" required className="w-full px-5 py-4 rounded-xl border border-slate-200 outline-none focus:border-red-500 bg-slate-50 font-medium" value={password} onChange={e => setPassword(e.target.value)} />
                                <button type="submit" disabled={loading} className="w-full py-4 bg-red-600 text-white rounded-xl font-bold shadow-lg hover:bg-red-700 transition-all">{loading ? 'กำลังตรวจสอบ...' : 'เข้าสู่ระบบ'}</button>
                                <button type="button" onClick={() => setView('landing')} className="w-full text-slate-400 hover:text-slate-600 text-sm mt-4 font-semibold text-center block w-full">← กลับหน้าหลัก</button>
                            </form>
                        </div>
                    </div>
                );
            }

            if (view === 'admin') {
                return (
                    <div className="min-h-screen bg-slate-50">
                        <nav className="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
                            <div className="font-black text-red-600 text-lg">PPP Admin Dashboard</div>
                            <button onClick={handleLogout} className="text-sm font-bold text-slate-500 hover:text-red-600 transition-colors bg-slate-50 px-4 py-2 rounded-lg">ออกจากระบบ</button>
                        </nav>
                        <div className="max-w-7xl mx-auto px-4 py-8 animate-in fade-in slide-in-from-bottom-4">
                            <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                                <h1 className="text-xl font-black">รายชื่อผู้ลงทะเบียน ({registrations.length})</h1>
                                <button onClick={exportToCSV} className="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-xl font-bold shadow-md transition-all">📥 โหลดข้อมูลเป็น Excel</button>
                            </div>
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden overflow-x-auto">
                                <table className="w-full text-left whitespace-nowrap">
                                    <thead className="bg-slate-50 border-b border-slate-200 text-xs font-bold text-slate-500 uppercase">
                                        <tr>
                                            <th className="px-6 py-4">ลำดับ</th>
                                            <th className="px-6 py-4">ชื่อ-นามสกุล / ชื่อเล่น</th>
                                            <th className="px-6 py-4">บริษัท</th>
                                            <th className="px-6 py-4">เบอร์โทร / อีเมล</th>
                                            <th className="px-6 py-4 text-center">สถานะ</th>
                                            <th className="px-6 py-4">เมนูที่เลือก</th>
                                            <th className="px-6 py-4 text-right">ลบ</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100 text-sm">
                                        {registrations.map((r, i) => (
                                            <tr key={r.id} className="hover:bg-slate-50 transition-colors">
                                                <td className="px-6 py-4 text-slate-400 font-bold">{i + 1}</td>
                                                <td className="px-6 py-4">
                                                    <div className="font-bold text-slate-800">{r.name}</div>
                                                    <div className="text-xs text-slate-500">{r.nickname ? `(${r.nickname})` : '-'}</div>
                                                </td>
                                                <td className="px-6 py-4 text-slate-600 font-medium">{r.company}</td>
                                                <td className="px-6 py-4">
                                                    <div className="font-bold text-slate-700">{r.phone}</div>
                                                    <div className="text-xs text-slate-500">{r.email || '-'}</div>
                                                </td>
                                                <td className="px-6 py-4 text-center">
                                                    <span className={`px-3 py-1 rounded-full text-[11px] font-bold ${r.attendance === 'เข้าร่วม' ? 'bg-red-100 text-red-700' : 'bg-slate-100 text-slate-500'}`}>{r.attendance}</span>
                                                </td>
                                                <td className="px-6 py-4">
                                                    {r.attendance === 'เข้าร่วม' ? (
                                                        <div className="text-xs font-bold text-indigo-700 bg-indigo-50 px-3 py-1.5 rounded-lg border border-indigo-100 inline-block max-w-[200px] truncate" title={r.foodMenu}>
                                                            {r.foodMenu || '-'}
                                                        </div>
                                                    ) : (
                                                        <span className="text-slate-300 font-bold">-</span>
                                                    )}
                                                </td>
                                                <td className="px-6 py-4 text-right">
                                                    <button onClick={() => handleDelete(r.id)} className="text-slate-300 hover:text-red-500 font-bold text-lg p-2 rounded-lg hover:bg-red-50 transition-colors">🗑️</button>
                                                </td>
                                            </tr>
                                        ))}
                                        {registrations.length === 0 && (
                                            <tr><td colSpan="7" className="py-12 text-center text-slate-400 font-bold">ยังไม่มีข้อมูลผู้ลงทะเบียน</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            }
            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
