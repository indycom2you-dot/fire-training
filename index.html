<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนสัมมนา - ประกันรถยนต์ 2+ PPP Insurance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f3f4f6; }
        .glass-effect { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDK (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyC9-6NepYeoyU4-pluImdIcNBV6H7ThLas",
            authDomain: "ppp-registration.firebaseapp.com",
            projectId: "ppp-registration",
            storageBucket: "ppp-registration.firebasestorage.app",
            messagingSenderId: "1072711188640",
            appId: "1:1072711188640:web:e639ef36b32ea637ab09c5",
            measurementId: "G-Z0XFPK8CJ7"
        };

        const App = () => {
            const [view, setView] = React.useState('landing'); 
            const [user, setUser] = React.useState(null);
            const [registrations, setRegistrations] = React.useState([]);
            const [loading, setLoading] = React.useState(false);
            const [errorMsg, setErrorMsg] = React.useState('');
            const [username, setUsername] = React.useState('');
            const [password, setPassword] = React.useState('');

            const [formData, setFormData] = React.useState({
                name: '',
                nickname: '',
                company: '',
                email: '',
                phone: '',
                attendance: 'เข้าร่วม',
                foodMenu: '',
                acceptedTerms: false
            });

            React.useEffect(() => {
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                const auth = firebase.auth();
                const db = firebase.firestore();

                const initAuth = async () => {
                    if (!auth.currentUser) {
                        try { await auth.signInAnonymously(); } catch(e) { console.error("Auth init error:", e); }
                    }
                };
                initAuth();

                let unsubscribeData = null;
                const unsubscribeAuth = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    if (unsubscribeData) { unsubscribeData(); unsubscribeData = null; }
                    if (u && !u.isAnonymous) {
                        setView('admin');
                        unsubscribeData = db.collection('registrations')
                            .onSnapshot((snapshot) => {
                                const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                                items.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                                setRegistrations(items);
                            });
                    }
                });
                return () => { unsubscribeAuth(); if (unsubscribeData) unsubscribeData(); };
            }, []);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (formData.attendance === 'เข้าร่วม') {
                    if (!formData.acceptedTerms) { setErrorMsg('กรุณากดยอมรับเงื่อนไขครับ'); return; }
                    if (!formData.foodMenu.trim()) { setErrorMsg('กรุณาระบุเมนู ขนม และ เครื่องดื่ม ครับ'); return; }
                }
                setLoading(true);
                try {
                    await firebase.firestore().collection('registrations').add({
                        ...formData,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setView('success');
                    setFormData({ name: '', nickname: '', company: '', email: '', phone: '', attendance: 'เข้าร่วม', foodMenu: '', acceptedTerms: false });
                } catch (err) { setErrorMsg("เกิดข้อผิดพลาด: " + err.message); }
                setLoading(false);
            };

            const handleAdminLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const loginEmail = username.includes('@') ? username : `${username}@ppp.com`;
                    await firebase.auth().signInWithEmailAndPassword(loginEmail, password);
                } catch (err) { setErrorMsg("ข้อมูลไม่ถูกต้อง"); }
                setLoading(false);
            };

            const exportToCSV = () => {
                const headers = ["ชื่อ-นามสกุล", "ชื่อเล่น", "บริษัท", "อีเมล", "โทร", "สถานะ", "เมนู", "วันที่"];
                const rows = registrations.map(r => [
                    `"${r.name}"`, `"${r.nickname || '-'}"`, `"${r.company}"`, `"${r.email || '-'}"`, `"${r.phone}"`, `"${r.attendance}"`, `"${r.foodMenu || '-'}"`,
                    `"${r.createdAt?.toDate().toLocaleString('th-TH') || ''}"`
                ]);
                const csvContent = "\uFEFF" + [headers, ...rows].map(e => e.join(",")).join("\n");
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `รายชื่อ_รถยนต์2พลัส.csv`;
                link.click();
            };

            if (view === 'landing') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="max-w-md w-full bg-white rounded-[32px] shadow-2xl overflow-hidden relative">
                            <div className="h-56 w-full relative bg-slate-800">
                                <img src="./cover.png" alt="Cover" className="w-full h-full object-cover" onError={(e) => {e.target.src="https://images.unsplash.com/photo-1502877338535-766e1452684a?q=80&w=800"}} />
                                <div className="absolute inset-0 bg-gradient-to-t from-slate-900/40 to-transparent"></div>
                            </div>
                            <div className="p-6 md:p-8 relative z-10 -mt-6 bg-white rounded-t-[32px]">
                                <h1 className="text-2xl md:text-3xl font-black text-slate-800 leading-tight mb-2">ประกันรถยนต์ 2+ คุ้มค่า จัดเต็ม</h1>
                                <p className="text-red-600 font-bold text-lg mb-6">เน้นความคุ้มครองน้ำท่วม ในราคาสุดคุ้ม</p>
                                
                                <div className="space-y-5 mb-8">
                                    <div className="flex items-start gap-4">
                                        <div className="text-xl shrink-0 mt-0.5">🗓️</div>
                                        <div className="text-[15px] flex w-full leading-relaxed">
                                            <div className="font-bold text-slate-800 w-[90px] shrink-0">วันที่:</div>
                                            <div className="font-medium text-slate-600">13 พฤษภาคม 2569</div>
                                        </div>
                                    </div>
                                    <div className="flex items-start gap-4">
                                        <div className="text-xl shrink-0 mt-0.5">⏰</div>
                                        <div className="text-[15px] flex w-full leading-relaxed">
                                            <div className="font-bold text-slate-800 w-[90px] shrink-0">เวลา:</div>
                                            <div className="flex flex-col">
                                                <span className="font-medium text-slate-600">ลงทะเบียน 10.00 น.</span>
                                                <span className="font-bold text-red-600 mt-0.5">เริ่มประชุม 10.30 น.</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex items-start gap-4">
                                        <div className="text-xl shrink-0 mt-0.5">📍</div>
                                        <div className="text-[15px] flex w-full leading-relaxed">
                                            <div className="font-bold text-slate-800 w-[90px] shrink-0">สถานที่:</div>
                                            <div className="font-medium text-slate-600">ร้าน ณ คุณ</div>
                                        </div>
                                    </div>
                                    <div className="flex items-start gap-4">
                                        <div className="text-xl shrink-0 mt-0.5">🎤</div>
                                        <div className="text-[15px] flex w-full leading-relaxed">
                                            <div className="font-bold text-slate-800 w-[90px] shrink-0">วิทยากร:</div>
                                            <div className="flex flex-col text-slate-800">
                                                <span className="font-bold">คุณณัฐพัตร์ เพ็ชรสุวรรณ (คุณวี)</span>
                                                <span className="text-[13px] font-bold text-slate-500 mt-1 leading-snug">
                                                    Hatyai Independent Distribution Partners Manager <br/> 
                                                    บริษัท CHUBB
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex items-start gap-4 pt-2">
                                        <div className="text-xl shrink-0 mt-0.5">💡</div>
                                        <div className="text-[15px] flex w-full">
                                            <div className="font-bold text-slate-800 w-[90px] shrink-0">รายละเอียด:</div>
                                            <div className="font-medium text-slate-600 leading-relaxed text-justify pr-2">
                                                เจาะลึกแผนประกันรถยนต์ 2+ ที่ตอบโจทย์ความเสี่ยงในปัจจุบัน โดยเฉพาะ <span className="text-blue-600 font-bold italic">ความคุ้มครองน้ำท่วม</span> ที่กำลังเป็นปัญหาหลัก พร้อมเทคนิคการเลือกซื้อในราคาสุดคุ้ม
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <button onClick={() => setView('form')} className="w-full py-4 bg-[#dc2626] text-white rounded-2xl font-bold text-lg shadow-lg hover:bg-red-700 hover:-translate-y-1 transition-all">ลงทะเบียนเข้าร่วมอบรม 👉</button>
                            </div>
                            <div className="py-4 text-center border-t border-slate-100 bg-slate-50">
                                <button onClick={() => setView('login')} className="text-[10px] font-bold tracking-widest text-slate-300 hover:text-slate-500 uppercase">Secure Admin Access</button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'form') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 py-10">
                        <div className="max-w-md w-full bg-white rounded-[32px] shadow-2xl overflow-hidden p-6 md:p-8 animate-in slide-in-from-right-4 duration-300">
                            <button onClick={() => setView('landing')} className="text-sm font-bold text-slate-400 hover:text-slate-600 mb-6 flex items-center gap-1">← ย้อนกลับ</button>
                            <div className="text-center mb-8">
                                <h2 className="text-2xl font-black text-slate-800 mb-2">ลงทะเบียนอบรม</h2>
                                <p className="text-red-600 font-bold text-[15px]">"ประกันรถยนต์ 2+ คุ้มค่า จัดเต็ม"</p>
                                <p className="text-xs text-slate-400 mt-4 font-bold tracking-wide">จัดทำโดย บริษัท พีพีพี อินชัวรันส์ โบรคเกอร์ จำกัด</p>
                            </div>
                            {errorMsg && <div className="mb-6 p-4 bg-red-50 text-red-600 rounded-xl text-sm font-bold border border-red-100">{errorMsg}</div>}
                            <form onSubmit={handleSubmit} className="space-y-4">
                                <input type="text" required placeholder="ชื่อ - นามสกุล *" className="w-full px-5 py-3.5 rounded-xl border border-slate-100 bg-slate-50 outline-none focus:bg-white focus:ring-2 focus:ring-red-500 transition-all" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                                <input type="text" placeholder="ชื่อเล่น (ถ้ามี)" className="w-full px-5 py-3.5 rounded-xl border border-slate-100 bg-slate-50 outline-none focus:bg-white focus:ring-2 focus:ring-red-500 transition-all" value={formData.nickname} onChange={e => setFormData({...formData, nickname: e.target.value})} />
                                <input type="text" required placeholder="บริษัท / หน่วยงาน *" className="w-full px-5 py-3.5 rounded-xl border border-slate-100 bg-slate-50 outline-none focus:bg-white focus:ring-2 focus:ring-red-500 transition-all" value={formData.company} onChange={e => setFormData({...formData, company: e.target.value})} />
                                <input type="email" placeholder="อีเมล (ถ้ามี)" className="w-full px-5 py-3.5 rounded-xl border border-slate-100 bg-slate-50 outline-none focus:bg-white focus:ring-2 focus:ring-red-500 transition-all" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} />
                                <input type="tel" required placeholder="เบอร์โทรศัพท์ *" className="w-full px-5 py-3.5 rounded-xl border border-slate-100 bg-slate-50 outline-none focus:bg-white focus:ring-2 focus:ring-red-500 transition-all" value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} />
                                
                                <div className="bg-slate-50 p-1.5 rounded-2xl flex border border-slate-100 mt-4">
                                    <button type="button" onClick={() => setFormData({...formData, attendance: 'เข้าร่วม'})} className={`flex-1 py-3 rounded-xl font-bold text-sm transition-all ${formData.attendance === 'เข้าร่วม' ? 'bg-white text-red-600 shadow-sm border border-slate-200' : 'text-slate-500'}`}>เข้าร่วม</button>
                                    <button type="button" onClick={() => setFormData({...formData, attendance: 'ไม่เข้าร่วม', foodMenu: '', acceptedTerms: false})} className={`flex-1 py-3 rounded-xl font-bold text-sm transition-all ${formData.attendance === 'ไม่เข้าร่วม' ? 'bg-white text-slate-700 shadow-sm border border-slate-200' : 'text-slate-500'}`}>ไม่เข้าร่วม</button>
                                </div>

                                {formData.attendance === 'เข้าร่วม' && (
                                    <div className="space-y-4 animate-in fade-in pt-4 border-t border-slate-100 mt-4">
                                        <div>
                                            <label className="block text-sm font-bold text-slate-700 mb-2">🍽️ ระบุเมนู ขนม และ เครื่องดื่ม ที่ต้องการ *</label>
                                            <input type="text" required placeholder="เช่น ชาไทยเย็น, กาแฟ + แซนด์วิช" className="w-full px-5 py-3.5 rounded-xl border border-slate-100 bg-slate-50 outline-none focus:bg-white focus:ring-2 focus:ring-red-500 transition-all" value={formData.foodMenu} onChange={e => setFormData({...formData, foodMenu: e.target.value})} />
                                        </div>
                                        <div className="bg-red-50 p-5 rounded-2xl border border-red-100">
                                            <p className="text-sm text-slate-700 mb-4"><strong className="text-red-600">📌 หมายเหตุ:</strong> หากลงทะเบียนยืนยันแล้วไม่มา ขอสงวนสิทธิ์เก็บเงิน 300 บาท</p>
                                            <label className="flex items-center gap-3 cursor-pointer group">
                                                <input type="checkbox" className="w-5 h-5 rounded accent-red-600 cursor-pointer" checked={formData.acceptedTerms} onChange={e => setFormData({...formData, acceptedTerms: e.target.checked})} />
                                                <span className="text-sm font-bold text-slate-800 group-hover:text-red-600 transition-colors">รับทราบและยอมรับเงื่อนไข</span>
                                            </label>
                                        </div>
                                    </div>
                                )}
                                <button type="submit" disabled={loading} className="w-full py-4 bg-red-600 text-white rounded-2xl font-bold text-lg mt-6 shadow-lg hover:bg-red-700 transition-all disabled:opacity-70">{loading ? "กำลังบันทึก..." : "ยืนยันการลงทะเบียน"}</button>
                            </form>
                        </div>
                    </div>
                );
            }

            if (view === 'success') return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="max-w-md w-full bg-white p-10 rounded-[32px] shadow-2xl text-center">
                        <div className="text-6xl mb-6">✅</div>
                        <h2 className="text-2xl font-black mb-2 text-slate-800">บันทึกข้อมูลเรียบร้อย</h2>
                        <button onClick={() => setView('landing')} className="w-full py-4 bg-slate-100 rounded-xl font-bold mt-8">กลับหน้าแรก</button>
                    </div>
                </div>
            );

            if (view === 'login') return (
                <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4">
                    <div className="w-full max-w-sm bg-white p-8 rounded-[32px] shadow-2xl text-center">
                        <h2 className="text-2xl font-bold mb-6">Admin Login</h2>
                        <form onSubmit={handleAdminLogin} className="space-y-4 text-left">
                            <input type="text" placeholder="Username" className="w-full px-5 py-4 rounded-xl border bg-slate-50 outline-none focus:border-red-500" value={username} onChange={e => setUsername(e.target.value)} />
                            <input type="password" placeholder="Password" className="w-full px-5 py-4 rounded-xl border bg-slate-50 outline-none focus:border-red-500" value={password} onChange={e => setPassword(e.target.value)} />
                            <button type="submit" className="w-full py-4 bg-red-600 text-white rounded-xl font-bold">เข้าสู่ระบบ</button>
                            <button type="button" onClick={() => setView('landing')} className="w-full text-slate-400 text-sm mt-4">กลับหน้าหลัก</button>
                        </form>
                    </div>
                </div>
            );

            if (view === 'admin') return (
                <div className="min-h-screen bg-slate-50">
                    <nav className="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50">
                        <div className="font-black text-red-600">PPP Admin</div>
                        <button onClick={() => firebase.auth().signOut()} className="text-sm font-bold text-slate-500">ออกจากระบบ</button>
                    </nav>
                    <div className="max-w-7xl mx-auto px-4 py-8">
                        <div className="flex justify-between items-center mb-6">
                            <h1 className="text-xl font-black">รายชื่อผู้ลงทะเบียน ({registrations.length})</h1>
                            <button onClick={exportToCSV} className="bg-emerald-600 text-white px-4 py-2 rounded-lg font-bold">📥 โหลด Excel</button>
                        </div>
                        <div className="bg-white rounded-2xl shadow overflow-hidden overflow-x-auto border border-slate-200">
                            <table className="w-full text-left">
                                <thead className="bg-slate-50 text-xs font-bold text-slate-500 uppercase">
                                    <tr>
                                        <th className="px-4 py-4">ชื่อ</th><th className="px-4 py-4">บริษัท</th><th className="px-4 py-4">โทร</th><th className="px-4 py-4 text-center">สถานะ</th><th className="px-4 py-4">เมนู</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y text-sm">
                                    {registrations.map(r => (
                                        <tr key={r.id} className="hover:bg-slate-50 transition-colors">
                                            <td className="px-4 py-4 font-bold">{r.name} <span className="text-xs font-normal">({r.nickname || '-'})</span></td>
                                            <td className="px-4 py-4 text-slate-600">{r.company}</td>
                                            <td className="px-4 py-4">{r.phone}</td>
                                            <td className="px-4 py-4 text-center"><span className={`px-2 py-0.5 rounded-full text-[10px] font-bold ${r.attendance === 'เข้าร่วม' ? 'bg-red-100 text-red-700' : 'bg-slate-100 text-slate-400'}`}>{r.attendance}</span></td>
                                            <td className="px-4 py-4 text-indigo-700 font-bold">{r.foodMenu || '-'}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
