<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนอบรม - ความเสี่ยงรอบด้าน คุ้มครองรอบตัว ด้วยประกันอัคคีภัย</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
        .admin-gradient { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDK (Version Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- SheetJS สำหรับ Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

    <script type="text/babel">
        // รหัสเชื่อมต่อ FIREBASE ของคุณอภิชิต
        const firebaseConfig = {
            apiKey: "AIzaSyC9-6NepYeoyU4-pluImdIcNBV6H7ThLas",
            authDomain: "ppp-registration.firebaseapp.com",
            projectId: "ppp-registration",
            storageBucket: "ppp-registration.firebasestorage.app",
            messagingSenderId: "1072711188640",
            appId: "1:1072711188640:web:e639ef36b32ea637ab09c5",
            measurementId: "G-Z0XFPK8CJ7"
        };

        const App = () => {
            const [view, setView] = React.useState('landing'); // 'landing', 'form', 'login', 'admin'
            const [user, setUser] = React.useState(null);
            const [records, setRecords] = React.useState([]);
            const [loading, setLoading] = React.useState(false);
            const [submitted, setSubmitted] = React.useState(false);
            const [errorMsg, setErrorMsg] = React.useState(''); 
            
            // ล็อกอินแอดมิน
            const [email, setEmail] = React.useState('');
            const [password, setPassword] = React.useState('');

            // ฟอร์มลูกค้า
            const [formData, setFormData] = React.useState({ name: '', nickname: '', company: '', phone: '', email: '', attendance: 'เข้าร่วม' });

            // 1 & 5. Fix: React useEffect cleanup logic & Listener safety
            React.useEffect(() => {
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                const auth = firebase.auth();
                const db = firebase.firestore();

                let unsubscribeData = null; // เริ่มต้นด้วย null เพื่อความปลอดภัย

                const unsubscribeAuth = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    
                    // ป้องกัน Listener ซ้อนทับกัน โดยการยกเลิกของเก่าก่อนถ้ามี
                    if (unsubscribeData) {
                        unsubscribeData();
                        unsubscribeData = null;
                    }

                    if (u && !u.isAnonymous) {
                        setView('admin');
                        // เปลี่ยน Path ให้สะอาดตามที่ต้องการ: collection('registrations')
                        unsubscribeData = db.collection('registrations')
                            .onSnapshot((snapshot) => {
                                const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                                items.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                                setRecords(items);
                            }, (error) => {
                                console.error("Firestore Error:", error);
                            });
                    } else {
                        // เคลียร์ข้อมูลจากหน้าจอเมื่อล็อกเอาท์
                        setRecords([]);
                    }
                });

                // Cleanup ฟังก์ชันให้เคลียร์ทั้ง Auth และ Database อย่างถูกต้อง
                return () => {
                    unsubscribeAuth();
                    if (unsubscribeData) {
                        unsubscribeData();
                    }
                };
            }, []);

            const handleAdminLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setErrorMsg('');
                try {
                    await firebase.auth().signInWithEmailAndPassword(email, password);
                } catch (err) {
                    setErrorMsg("อีเมลหรือรหัสผ่านไม่ถูกต้องครับคุณอภิชิต");
                }
                setLoading(false);
            };

            const handleLogout = async () => {
                try {
                    await firebase.auth().signOut();
                    setView('landing');
                    setSubmitted(false);
                    setEmail('');
                    setPassword('');
                    setErrorMsg('');
                } catch (err) {
                    console.error("Logout Error:", err);
                }
            };

            const handleSubmitCustomer = async (e) => {
                e.preventDefault();
                setLoading(true);
                setErrorMsg('');

                // 2. Fix: Normalize Thai phone numbers before validation
                const normalizedPhone = formData.phone.replace(/[\s-]/g, '');
                
                if (!/^\d{9,10}$/.test(normalizedPhone)) {
                    setErrorMsg('กรุณาระบุเบอร์โทรศัพท์ให้ถูกต้อง (ตัวเลข 9-10 หลัก)');
                    setLoading(false);
                    return;
                }

                // 3. Fix: Normalize email before checking
                const normalizedEmail = formData.email.trim().toLowerCase();

                try {
                    const auth = firebase.auth();
                    const db = firebase.firestore();
                    
                    if (!auth.currentUser) await auth.signInAnonymously();

                    // เปลี่ยน Path เป็น registrations เปล่าๆ ตามที่สั่ง
                    const registrationsRef = db.collection('registrations');
                    
                    // 1. เช็คเบอร์โทรศัพท์ซ้ำ (จาก Document ID โดยตรง)
                    const docCheck = await registrationsRef.doc(normalizedPhone).get();
                    if (docCheck.exists) {
                        setErrorMsg('เบอร์โทรศัพท์นี้ถูกใช้ลงทะเบียนไปแล้วครับ');
                        setLoading(false);
                        return;
                    }

                    // 2. เช็คชื่อ-นามสกุลซ้ำ
                    const nameCheck = await registrationsRef.where('name', '==', formData.name.trim()).get();
                    if (!nameCheck.empty) {
                        setErrorMsg('ชื่อ-นามสกุลนี้ถูกใช้ลงทะเบียนไปแล้วครับ');
                        setLoading(false);
                        return;
                    }

                    // 3. เช็คอีเมลซ้ำ (ถ้าลูกค้ากรอกมา)
                    if (normalizedEmail !== '') {
                        const emailCheck = await registrationsRef.where('email', '==', normalizedEmail).get();
                        if (!emailCheck.empty) {
                            setErrorMsg('อีเมลนี้ถูกใช้ลงทะเบียนไปแล้วครับ');
                            setLoading(false);
                            return;
                        }
                    }

                    // 2. & 4. Fix: Use set() with normalizedPhone as Document ID + Trim company
                    await registrationsRef.doc(normalizedPhone).set({
                        name: formData.name.trim(),
                        nickname: formData.nickname.trim(),
                        company: formData.company.trim(),
                        phone: formData.phone.trim(), 
                        normalizedPhone: normalizedPhone,
                        email: normalizedEmail,
                        attendance: formData.attendance,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    setSubmitted(true);
                    setFormData({ name: '', nickname: '', company: '', phone: '', email: '', attendance: 'เข้าร่วม' });
                } catch (err) {
                    if (err.code === 'permission-denied') {
                        setErrorMsg('ไม่สามารถบันทึกข้อมูลได้ กรุณาตรวจสอบสิทธิ์ Firebase Security Rules');
                    } else {
                        setErrorMsg("เกิดข้อผิดพลาด: " + err.message);
                    }
                }
                setLoading(false);
            };

            // Review "Clear all data" feature with limits
            const handleClearAll = async () => {
                if (window.confirm("⚠️ คำเตือน: การลบข้อมูลจากฝั่งผู้ใช้ (Client) มีความเสี่ยงที่จะทำให้ระบบค้างหากมีข้อมูลจำนวนมาก และข้อมูลจะสูญหายถาวร\n\nยืนยันที่จะลบข้อมูลหรือไม่?")) {
                    const pass = prompt("พิมพ์คำว่า 'CONFIRM_DELETE' เพื่อยืนยันการล้างข้อมูล:");
                    if (pass === 'CONFIRM_DELETE') {
                        setLoading(true);
                        try {
                            const db = firebase.firestore();
                            const registrationsRef = db.collection('registrations');
                            
                            // ลบข้อมูลทีละ 500 รายการเพื่อป้องกัน Request ระเบิด
                            const snapshot = await registrationsRef.limit(500).get();
                            
                            if (snapshot.empty) {
                                alert("ไม่มีข้อมูลให้ลบครับ");
                                setLoading(false);
                                return;
                            }

                            const batch = db.batch();
                            snapshot.docs.forEach((doc) => {
                                batch.delete(doc.ref);
                            });
                            
                            await batch.commit();
                            alert(`เคลียร์ข้อมูลเรียบร้อยแล้ว (${snapshot.size} รายการ)`);
                        } catch (err) {
                            alert("เคลียร์ข้อมูลไม่สำเร็จ: " + err.message);
                        }
                        setLoading(false);
                    } else if (pass !== null) {
                        alert("ยกเลิกการลบข้อมูล (รหัสยืนยันไม่ถูกต้อง)");
                    }
                }
            };

            const handleDelete = async (id) => {
                if (window.confirm("คุณอภิชิตต้องการลบรายชื่อนี้ใช่หรือไม่?")) {
                    try {
                        const db = firebase.firestore();
                        await db.collection('registrations').doc(id).delete();
                    } catch (err) {
                        alert("ลบข้อมูลไม่สำเร็จ: " + err.message);
                    }
                }
            };

            const exportExcel = () => {
                const data = records.map((r, i) => ({
                    "ลำดับ": i + 1,
                    "ชื่อ-นามสกุล": r.name,
                    "ชื่อเล่น": r.nickname || '-',
                    "อีเมล": r.email || '-',
                    "บริษัท": r.company,
                    "เบอร์โทร": r.phone,
                    "ความประสงค์": r.attendance,
                    "วันที่ลงทะเบียน": r.createdAt?.toDate().toLocaleString('th-TH')
                }));
                const ws = XLSX.utils.json_to_sheet(data);
                const wscols = [{wch:8}, {wch:25}, {wch:15}, {wch:25}, {wch:25}, {wch:15}, {wch:15}, {wch:22}];
                ws['!cols'] = wscols;
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "รายชื่อผู้ลงทะเบียน");
                XLSX.writeFile(wb, `รายงานลงทะเบียน_${new Date().toLocaleDateString('th-TH').replace(/\//g, '-')}.xlsx`);
            };

            // --- หน้าจอแอดมิน ---
            if (user && !user.isAnonymous && view === 'admin') {
                // คำนวณสถิติสำหรับ Dashboard
                const totalRegistrations = records.length;
                const attendingCount = records.filter(r => r.attendance === 'เข้าร่วม').length;
                const absentCount = records.filter(r => r.attendance === 'ไม่เข้าร่วม').length;
                const attendingPercent = totalRegistrations > 0 ? Math.round((attendingCount / totalRegistrations) * 100) : 0;

                return (
                    <div className="min-h-screen bg-slate-50 p-4 md:p-8">
                        <div className="max-w-6xl mx-auto">
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 bg-white p-6 rounded-2xl shadow-sm border border-slate-100 gap-4">
                                <div>
                                    <h1 className="text-xl font-bold text-slate-800">ระบบจัดการหลังบ้าน</h1>
                                    <p className="text-xs text-slate-400">ล็อกอินโดย: {user.email}</p>
                                </div>
                                <div className="flex gap-2 w-full md:w-auto flex-wrap">
                                    <button onClick={handleClearAll} disabled={loading} className="flex-1 md:flex-none bg-red-100 text-red-600 px-4 py-2 rounded-xl text-sm font-bold shadow-sm hover:bg-red-200 transition-all disabled:opacity-50">🗑️ ล้างข้อมูล 500 รายการ</button>
                                    <button onClick={exportExcel} className="flex-1 md:flex-none bg-green-600 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-md hover:bg-green-700 transition-all">โหลด Excel</button>
                                    <button onClick={handleLogout} className="flex-1 md:flex-none bg-slate-100 text-slate-600 px-4 py-2 rounded-xl text-sm font-bold hover:bg-slate-200 transition-all">ออกจากระบบ</button>
                                </div>
                            </div>

                            {/* 📊 Dashboard Section (เห็นเฉพาะ Admin) 📊 */}
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                                {/* กล่อง 1: รวมทั้งหมด */}
                                <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 flex items-center justify-between hover:shadow-md transition-shadow">
                                    <div>
                                        <p className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-1">ยอดลงทะเบียนรวม</p>
                                        <div className="text-4xl font-extrabold text-slate-800">{totalRegistrations}</div>
                                    </div>
                                    <div className="w-14 h-14 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center">
                                        <svg className="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                                    </div>
                                </div>
                                {/* กล่อง 2: เข้าร่วม */}
                                <div className="bg-white rounded-2xl p-6 shadow-sm border border-emerald-100 flex items-center justify-between hover:shadow-md transition-shadow">
                                    <div>
                                        <p className="text-xs text-emerald-600 font-bold uppercase tracking-wider mb-1">ยืนยันเข้าร่วมงาน</p>
                                        <div className="text-4xl font-extrabold text-slate-800">{attendingCount}</div>
                                    </div>
                                    <div className="w-14 h-14 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center">
                                        <svg className="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    </div>
                                </div>
                                {/* กล่อง 3: ไม่เข้าร่วม */}
                                <div className="bg-white rounded-2xl p-6 shadow-sm border border-red-100 flex items-center justify-between hover:shadow-md transition-shadow">
                                    <div>
                                        <p className="text-xs text-red-500 font-bold uppercase tracking-wider mb-1">ไม่สามารถเข้าร่วม</p>
                                        <div className="text-4xl font-extrabold text-slate-800">{absentCount}</div>
                                    </div>
                                    <div className="w-14 h-14 bg-red-50 text-red-500 rounded-2xl flex items-center justify-center">
                                        <svg className="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    </div>
                                </div>
                            </div>

                            {/* หลอดแสดงเปอร์เซ็นต์ (Progress Bar) */}
                            {totalRegistrations > 0 && (
                                <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 mb-8">
                                    <div className="flex justify-between items-end mb-3">
                                        <span className="text-sm font-bold text-slate-600">อัตราการเข้าร่วมงาน (Attendance Rate)</span>
                                        <span className="text-xl font-extrabold text-emerald-600">{attendingPercent}%</span>
                                    </div>
                                    <div className="w-full bg-slate-100 rounded-full h-4 overflow-hidden shadow-inner">
                                        <div className="bg-gradient-to-r from-emerald-400 to-emerald-500 h-4 rounded-full transition-all duration-1000 ease-out" style={{ width: `${attendingPercent}%` }}></div>
                                    </div>
                                </div>
                            )}
                            
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left text-sm">
                                        <thead className="bg-slate-50 border-b font-bold text-slate-500">
                                            <tr>
                                                <th className="p-4">ผู้ลงทะเบียน</th>
                                                <th className="p-4">ข้อมูลติดต่อ (อีเมล / เบอร์โทร)</th>
                                                <th className="p-4 text-center">สถานะ</th>
                                                <th className="p-4 text-right">จัดการ</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y">
                                            {records.map(r => (
                                                <tr key={r.id} className="hover:bg-slate-50 transition-colors">
                                                    <td className="p-4 font-bold min-w-[200px]">
                                                        {r.name} {r.nickname && <span className="text-red-500 font-medium ml-1">({r.nickname})</span>}
                                                        <div className="text-[10px] font-normal text-slate-400 mt-1">{r.company}</div>
                                                    </td>
                                                    <td className="p-4">
                                                        <div className="text-slate-600 font-medium">{r.email || '-'}</div>
                                                        <div className="text-slate-500 font-mono text-xs mt-1">{r.phone}</div>
                                                    </td>
                                                    <td className="p-4 text-center">
                                                        <span className={`px-2 py-1 rounded text-[10px] font-bold ${r.attendance === 'เข้าร่วม' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                                            {r.attendance}
                                                        </span>
                                                        <div className="text-[10px] text-slate-400 mt-2">
                                                            {r.createdAt ? r.createdAt.toDate().toLocaleDateString('th-TH') : ''}
                                                        </div>
                                                    </td>
                                                    <td className="p-4 text-right">
                                                        <button onClick={() => handleDelete(r.id)} className="text-slate-300 hover:text-red-500 transition-colors p-2 rounded-lg hover:bg-red-50" title="ลบรายชื่อนี้">
                                                            🗑️
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                            {records.length === 0 && (
                                                <tr><td colSpan="4" className="p-8 text-center text-slate-400">ยังไม่มีข้อมูลผู้ลงทะเบียน</td></tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // --- หน้าจอล็อกอินแอดมิน ---
            if (view === 'login') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 admin-gradient text-white">
                        <div className="w-full max-w-sm bg-white/10 backdrop-blur-xl p-8 rounded-3xl border border-white/20 shadow-2xl">
                            <h2 className="text-2xl font-bold mb-6 text-center italic">Admin Secure Login</h2>
                            
                            {errorMsg && (
                                <div className="mb-6 p-3 bg-red-500/20 border border-red-500/50 rounded-xl text-red-200 text-sm text-center">
                                    {errorMsg}
                                </div>
                            )}

                            <form onSubmit={handleAdminLogin} className="space-y-4">
                                <input type="email" placeholder="Email (อีเมลแอดมิน)" required className="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 outline-none focus:border-white/40" value={email} onChange={e => setEmail(e.target.value)} />
                                <input type="password" placeholder="Password (รหัสผ่าน)" required className="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 outline-none focus:border-white/40" value={password} onChange={e => setPassword(e.target.value)} />
                                <button type="submit" disabled={loading} className="w-full py-4 bg-white text-slate-900 rounded-xl font-bold shadow-lg hover:bg-slate-100 transition-all">
                                    {loading ? 'กำลังตรวจสอบ...' : 'เข้าสู่ระบบ'}
                                </button>
                                <button type="button" onClick={() => setView('landing')} className="w-full text-white/40 text-xs mt-4 hover:text-white transition-colors">กลับหน้าหลัก</button>
                            </form>
                        </div>
                    </div>
                );
            }

            // --- หน้าแรก (Landing Page) มีรูปและรายละเอียด ---
            if (view === 'landing') {
                return (
                    <div className="flex items-center justify-center p-4 pt-10 md:pt-20">
                        <div className="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
                            <div className="relative">
                                <img 
                                    src="https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" 
                                    alt="บ้านและประกันภัย" 
                                    className="w-full h-56 object-cover brightness-95"
                                />
                                <div className="absolute top-4 left-4 bg-white/95 backdrop-blur-sm px-3 py-2 rounded-xl shadow-md flex items-center gap-2">
                                    <span className="text-[11px] font-bold text-slate-800">บริษัท พีพีพี อินชัวรันส์ โบรคเกอร์ จำกัด</span>
                                </div>
                            </div>
                            
                            <div className="p-8">
                                <h1 className="text-2xl md:text-3xl font-bold text-slate-800 mb-4 leading-tight">
                                    ความเสี่ยงรอบด้าน คุ้มครองรอบตัว <br/> <span className="text-red-600">ด้วยประกันอัคคีภัย</span>
                                </h1>
                                
                                <div className="space-y-3 text-sm text-slate-600 mb-8">
                                    <p className="flex items-start gap-2">
                                        <span className="text-lg">📅</span> 
                                        <span><strong>วันที่:</strong> 15 พฤศจิกายน 2567</span>
                                    </p>
                                    <p className="flex items-start gap-2">
                                        <span className="text-lg">⏰</span> 
                                        <span><strong>เวลา:</strong> 09:00 - 12:00 น.</span>
                                    </p>
                                    <p className="flex items-start gap-2">
                                        <span className="text-lg">📍</span> 
                                        <span><strong>สถานที่:</strong> ห้องประชุมอาคาร A ชั้น 2</span>
                                    </p>
                                    <p className="flex items-start gap-2">
                                        <span className="text-lg">🎤</span> 
                                        <span>
                                            <strong>วิทยากร:</strong> คุณกฤตภาส ชีวชัชวาล (คุณกริต) <br/>
                                            <span className="text-xs text-slate-500 mt-0.5 block">ผู้จัดการอาวุโสฝ่ายพัฒนาธุรกิจ บริษัท MSIG สาขา หาดใหญ่</span>
                                        </span>
                                    </p>
                                    <p className="flex items-start gap-2">
                                        <span className="text-lg">💡</span> 
                                        <span><strong>รายละเอียด:</strong> เรียนรู้วิธีการประเมินความเสี่ยงอัคคีภัย การเลือกซื้อประกันให้ครอบคลุม และการจัดการเมื่อเกิดเหตุฉุกเฉิน</span>
                                    </p>
                                </div>

                                <button 
                                    onClick={() => setView('form')} 
                                    className="w-full py-4 bg-red-600 text-white rounded-2xl font-bold shadow-lg hover:bg-red-700 transition-all active:scale-95"
                                >
                                    ลงทะเบียนเข้าร่วมอบรม 👉
                                </button>

                                {/* ปุ่มลับแอดมิน */}
                                <button onClick={() => setView('login')} className="w-full mt-8 text-slate-200 text-[10px] tracking-widest hover:text-slate-400 transition-colors uppercase">
                                    Secure Admin Login
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // --- หน้าจอหลักของลูกค้า ---
            return (
                <div className="flex items-center justify-center p-4 pt-10 md:pt-20">
                    <div className="w-full max-w-md">
                        {submitted ? (
                            <div className="bg-white p-10 rounded-3xl shadow-xl text-center border border-slate-100">
                                <div className="text-6xl mb-6">✅</div>
                                <h2 className="text-2xl font-bold mb-2 text-slate-800">ลงทะเบียนสำเร็จ</h2>
                                <p className="text-slate-500 mb-8">ขอบคุณที่ลงทะเบียนครับ</p>
                                <button onClick={() => { setSubmitted(false); setView('landing'); setErrorMsg(''); }} className="w-full py-4 bg-red-600 text-white rounded-2xl font-bold shadow-lg hover:bg-red-700 transition-all">กลับหน้าหลัก</button>
                            </div>
                        ) : (
                            <div className="bg-white p-8 rounded-3xl shadow-xl border border-slate-100 overflow-hidden relative">
                                
                                {/* ปุ่มย้อนกลับไปหน้าแรก */}
                                <button 
                                    onClick={() => { setView('landing'); setErrorMsg(''); }} 
                                    className="absolute top-6 left-6 text-slate-400 hover:text-red-600 text-sm flex items-center gap-1 font-bold transition-colors"
                                >
                                    <span>←</span> กลับ
                                </button>

                                <div className="mb-6 mt-6 text-center">
                                    <h1 className="text-xl font-bold text-slate-800 mb-2 underline decoration-red-500 decoration-4">ลงทะเบียนอบรม</h1>
                                    <p className="text-xs text-red-600 font-bold italic leading-relaxed">หัวข้อ: "ความเสี่ยงรอบด้าน คุ้มครองรอบตัว ด้วยประกันอัคคีภัย"</p>
                                    <p className="text-[10px] text-slate-500 mt-2 font-medium">จัดโดย บริษัท พีพีพี อินชัวรันส์ โบรคเกอร์ จำกัด</p>
                                </div>

                                {errorMsg && (
                                    <div className="mb-6 p-4 bg-red-50 border-l-4 border-red-500 text-red-700 rounded-r-xl text-sm font-bold flex items-start gap-2">
                                        <span className="text-lg">⚠️</span>
                                        <span>{errorMsg}</span>
                                    </div>
                                )}

                                <form onSubmit={handleSubmitCustomer} className="space-y-4">
                                    <div className="space-y-1">
                                        <label className="text-xs font-bold text-slate-500 ml-1">ชื่อ - นามสกุล</label>
                                        <input type="text" required placeholder="ชื่อจริง-นามสกุล" className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-red-500 outline-none transition-all" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-xs font-bold text-slate-500 ml-1">ชื่อเล่น (ถ้ามี)</label>
                                        <input type="text" placeholder="ระบุชื่อเล่น" className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-red-500 outline-none transition-all" value={formData.nickname} onChange={e => setFormData({...formData, nickname: e.target.value})} />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-xs font-bold text-slate-500 ml-1">บริษัท / หน่วยงาน</label>
                                        <input type="text" required placeholder="ระบุชื่อบริษัท" className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-red-500 outline-none transition-all" value={formData.company} onChange={e => setFormData({...formData, company: e.target.value})} />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-xs font-bold text-slate-500 ml-1">อีเมล (ถ้ามี)</label>
                                        <input type="email" placeholder="example@email.com" className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-red-500 outline-none transition-all" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-xs font-bold text-slate-500 ml-1">เบอร์โทรศัพท์</label>
                                        <input type="tel" required placeholder="08X-XXX-XXXX" className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-red-500 outline-none transition-all" value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} />
                                    </div>
                                    
                                    <div className="pt-2">
                                        <label className="text-xs font-bold text-slate-500 ml-1 block mb-2">สะดวกเข้าอบรมหรือไม่</label>
                                        <div className="grid grid-cols-2 gap-3">
                                            <button type="button" onClick={() => setFormData({...formData, attendance: 'เข้าร่วม'})} className={`py-3 rounded-xl font-bold border-2 transition-all ${formData.attendance === 'เข้าร่วม' ? 'bg-red-600 border-red-600 text-white shadow-md' : 'bg-white border-slate-100 text-slate-400'}`}>เข้าร่วม</button>
                                            <button type="button" onClick={() => setFormData({...formData, attendance: 'ไม่เข้าร่วม'})} className={`py-3 rounded-xl font-bold border-2 transition-all ${formData.attendance === 'ไม่เข้าร่วม' ? 'bg-slate-800 border-slate-800 text-white shadow-md' : 'bg-white border-slate-100 text-slate-400'}`}>ไม่เข้าร่วม</button>
                                        </div>
                                    </div>
                                    <button type="submit" disabled={loading} className="w-full py-4 bg-red-600 text-white rounded-2xl font-bold shadow-lg hover:bg-red-700 transition-all mt-4 flex justify-center items-center">
                                        {loading ? <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : "ยืนยันลงทะเบียน"}
                                    </button>
                                </form>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
