    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyC9-6NepYeoyU4-pluImdIcNBV6H7ThLas",
            authDomain: "ppp-registration.firebaseapp.com",
            projectId: "ppp-registration",
            storageBucket: "ppp-registration.firebasestorage.app",
            messagingSenderId: "1072711188640",
            appId: "1:1072711188640:web:e639ef36b32ea637ab09c5",
            measurementId: "G-Z0XFPK8CJ7"
        };

        const App = () => {
            const [view, setView] = React.useState('landing'); 
            const [user, setUser] = React.useState(null);
            const [registrations, setRegistrations] = React.useState([]);
            const [loading, setLoading] = React.useState(false);
            const [submitted, setSubmitted] = React.useState(false);
            const [errorMsg, setErrorMsg] = React.useState('');
            
            const [username, setUsername] = React.useState('');
            const [password, setPassword] = React.useState('');

            const [isMenuSelectorOpen, setIsMenuSelectorOpen] = React.useState(false);
            const [enlargedImage, setEnlargedImage] = React.useState(null);
            const scrollRef = React.useRef(null);

            const [formData, setFormData] = React.useState({
                name: '', nickname: '', company: '', email: '', phone: '', attendance: 'เข้าร่วม', foodMenu: '', acceptedTerms: false
            });

            React.useEffect(() => {
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                const auth = firebase.auth();
                const db = firebase.firestore();

                let unsubscribeData = null;
                const initAuth = async () => { if (!auth.currentUser) { try { await auth.signInAnonymously(); } catch(e) {} } };
                initAuth();

                const unsubscribeAuth = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    if (unsubscribeData) { unsubscribeData(); unsubscribeData = null; }
                    if (u && !u.isAnonymous) {
                        setView('admin');
                        unsubscribeData = db.collection('registrations')
                            .onSnapshot((snapshot) => {
                                const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                                items.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                                setRegistrations(items);
                            });
                    }
                });
                return () => { unsubscribeAuth(); if (unsubscribeData) unsubscribeData(); };
            }, []);

            const handleSubmit = async (e) => {
                e.preventDefault();
                
                if (!formData.name.trim()) { setErrorMsg('กรุณากรอก "ชื่อ - นามสกุล" ด้วยครับ'); return; }
                if (!formData.company.trim()) { setErrorMsg('กรุณากรอก "บริษัท / หน่วยงาน" ด้วยครับ'); return; }
                if (!formData.phone.trim()) { setErrorMsg('กรุณากรอก "เบอร์โทรศัพท์" ด้วยครับ'); return; }

                if (formData.attendance === 'เข้าร่วม') {
                    if (!formData.foodMenu.trim()) { setErrorMsg('กรุณาเลือกเมนู ขนม และ เครื่องดื่ม ด้วยครับ'); return; }
                    if (!formData.acceptedTerms) { setErrorMsg('กรุณาติ๊กเครื่องหมายถูกที่ช่อง "รับทราบและยอมรับเงื่อนไข" ก่อนกดยืนยันครับ'); return; }
                }

                setLoading(true);
                setErrorMsg('');
                try {
                    const db = firebase.firestore();
                    await db.collection('registrations').add({
                        ...formData,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setView('success');
                    setFormData({ name: '', nickname: '', company: '', email: '', phone: '', attendance: 'เข้าร่วม', foodMenu: '', acceptedTerms: false });
                } catch (err) { setErrorMsg("เกิดข้อผิดพลาดในการเชื่อมต่อ กรุณาลองใหม่อีกครั้ง"); }
                setLoading(false);
            };

            const handleAdminLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const loginEmail = username.includes('@') ? username : `${username}@ppp.com`;
                    await firebase.auth().signInWithEmailAndPassword(loginEmail, password);
                } catch (err) { setErrorMsg("ข้อมูลไม่ถูกต้อง"); }
                setLoading(false);
            };

            const handleLogout = async () => {
                try {
                    await firebase.auth().signOut();
                    setView('landing'); setUsername(''); setPassword('');
                    await firebase.auth().signInAnonymously(); 
                } catch (err) { console.error("Logout Error:", err); }
            };

            const handleDelete = async (id) => {
                if (window.confirm("คุณต้องการลบข้อมูลผู้ลงทะเบียนรายนี้ใช่หรือไม่?")) {
                    try { await firebase.firestore().collection('registrations').doc(id).delete(); } 
                    catch (err) { alert("ลบข้อมูลไม่สำเร็จ: " + err.message); }
                }
            };

            const exportExcel = async () => {
                if (registrations.length === 0) { alert("ไม่มีข้อมูลให้ Export ครับ"); return; }

                const sheet = workbook.addWorksheet('รายชื่อผู้ลงทะเบียน', { views: [{ showGridLines: false, state: 'frozen', xSplit: 0, ySplit: 3 }] });

                sheet.columns = [
                    { header: 'ลำดับ', key: 'index', width: 6 }, { header: 'ชื่อ-นามสกุล', key: 'name', width: 22 }, { header: 'ชื่อเล่น', key: 'nickname', width: 10 },
                    { header: 'บริษัท / หน่วยงาน', key: 'company', width: 24 }, { header: 'เบอร์โทรศัพท์', key: 'phone', width: 15 }, { header: 'อีเมล', key: 'email', width: 28 },

                titleCell.font = { name: 'Sarabun', size: 14, bold: true, color: { argb: 'FFFFFFFF' } }; 
                titleCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFB91C1C' } }; 
                titleCell.alignment = { vertical: 'middle', horizontal: 'center' };

                metaCell.font = { name: 'Sarabun', size: 9, italic: true, color: { argb: 'FF475569' } }; 
                metaCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF1F5F9' } };
                metaCell.alignment = { vertical: 'middle', horizontal: 'right', indent: 1 };
                sheet.getRow(2).height = 18;

                const headerRow = sheet.getRow(3);
                headerRow.eachCell((cell) => {
                    cell.font = { name: 'Sarabun', size: 10, bold: true, color: { argb: 'FFFFFFFF' } }; 
                    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFDC2626' } }; 
                    cell.alignment = { vertical: 'middle', horizontal: 'center' };
                    cell.border = { top: {style:'thin', color:{argb:'FFB91C1C'}}, left: {style:'thin', color:{argb:'FFB91C1C'}}, bottom: {style:'thin', color:{argb:'FFB91C1C'}}, right: {style:'thin', color:{argb:'FFB91C1C'}} };
                });
                headerRow.height = 25; 
                sheet.autoFilter = 'A3:I3'; 

                registrations.forEach((r, idx) => {
                    const row = sheet.addRow({
                        index: idx + 1, name: r.name, nickname: r.nickname || '-', company: r.company, phone: r.phone,
                        email: r.email || '-', attendance: r.attendance, foodMenu: r.foodMenu || '-', date: r.createdAt?.toDate().toLocaleString('th-TH') || '-'
                    });
                    row.eachCell((cell, colNumber) => {
                        cell.font = { name: 'Sarabun', size: 10, color: { argb: 'FF1E293B' } };

                        if ([1, 3, 5, 7, 9].includes(colNumber)) { cell.alignment = { vertical: 'middle', horizontal: 'center', wrapText: true }; } 
                        else { cell.alignment = { vertical: 'middle', horizontal: 'left', indent: 1, wrapText: true }; }
                        if (idx % 2 === 1) cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF8FAFC' } };
                        if (colNumber === 7) {
                            if (r.attendance === 'เข้าร่วม') cell.font = { name: 'Sarabun', size: 10, bold: true, color: { argb: 'FF15803D' } }; 
                            else cell.font = { name: 'Sarabun', size: 10, bold: true, color: { argb: 'FF94A3B8' } }; 
                        }
                    });
                    row.height = 22; 
                });
                const buffer = await workbook.xlsx.writeBuffer();
                const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                saveAs(blob, `รายงานลงทะเบียน_รถยนต์2พลัส_${new Date().toISOString().slice(0, 10)}.xlsx`);
            };

            const slideLeft = () => { if(scrollRef.current) scrollRef.current.scrollBy({ left: -250, behavior: 'smooth' }); };
            const slideRight = () => { if(scrollRef.current) scrollRef.current.scrollBy({ left: 250, behavior: 'smooth' }); };


            // --- หน้า 1: Landing Page (มีลูกเล่นครบถ้วน) ---
            if (view === 'landing') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
                        {/* แสงออร่าพื้นหลัง */}
                        <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-red-400/20 rounded-full blur-3xl animate-pulse"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-indigo-400/20 rounded-full blur-3xl animate-pulse" style={{animationDelay: '1.5s'}}></div>

                        <div className="max-w-md w-full bg-white rounded-[32px] shadow-2xl overflow-hidden relative animate-in fade-in zoom-in-95 duration-700">
                            
                            <div className="h-56 w-full relative bg-slate-800 overflow-hidden group cursor-default">
                                <img 
                                    src="./cover.png" 
                                    alt="Cover" 
                                    className="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110" 
                                    onError={(e) => {e.target.src="https://images.unsplash.com/photo-1502877338535-766e1452684a?q=80&w=800"}} 
                                />
                                <div className="absolute inset-0 bg-gradient-to-t from-slate-900/60 to-transparent"></div>
                                <div className="absolute top-4 right-4 bg-white/20 backdrop-blur-md border border-white/30 text-white text-[11px] font-bold px-3 py-1.5 rounded-full animate-float shadow-lg">
                                    🚀 Special Event
                                </div>
                            </div>

                            <div className="p-6 md:p-8 relative z-10 -mt-6 bg-white rounded-t-[32px]">
                                <h1 className="text-2xl md:text-3xl font-black text-slate-800 leading-tight mb-2">ประกันรถยนต์ 2+ คุ้มค่า จัดเต็ม</h1>
                                <p className="text-red-600 font-bold text-lg mb-6">เน้นความคุ้มครองน้ำท่วม ในราคาสุดคุ้ม</p>

                                <div className="space-y-3 mb-8">
                                    <div className="flex items-start gap-4 group p-2 -m-2 rounded-2xl hover:bg-slate-50 transition-colors cursor-default">
                                        <div className="text-xl shrink-0 mt-0.5 group-hover:scale-110 group-hover:rotate-6 transition-transform">🗓️</div>
                                        <div className="text-[15px] flex w-full leading-relaxed">
                                            <div className="font-bold text-slate-800 w-[90px] shrink-0">วันที่:</div>
                                            <div className="font-medium text-slate-600">13 พฤษภาคม 2569</div>

                                            <div className="font-bold text-slate-800 w-[90px] shrink-0">สถานที่:</div>
                                            <div className="font-medium text-slate-600">ร้าน ณ คุณ</div>

                                    <div className="flex items-start gap-4 group p-2 -m-2 rounded-2xl hover:bg-slate-50 transition-colors cursor-default">
                                        <div className="text-xl shrink-0 mt-0.5 group-hover:scale-110 group-hover:-rotate-6 transition-transform">🎤</div>

                                            <div className="font-bold text-slate-800 w-[90px] shrink-0">วิทยากร:</div>
                                            <div className="flex flex-col text-slate-800">
                                                <span className="font-bold">คุณณัฐพัตร์ เพ็ชรสุวรรณ (คุณวี)</span>
                                                <span className="text-[13px] font-bold text-slate-500 mt-1 leading-snug">
                                                    Hatyai Independent Distribution Partners Manager <br/> 
                                                    บริษัท CHUBB
                                                </span>

                                        </div>

                                    <div className="flex items-start gap-4 group p-2 -m-2 rounded-2xl hover:bg-slate-50 transition-colors cursor-default pt-2">
                                        <div className="text-xl shrink-0 mt-0.5 group-hover:scale-110 group-hover:rotate-6 transition-transform">💡</div>

                                                เจาะลึกแผนประกันรถยนต์ 2+ ที่ตอบโจทย์ความเสี่ยงในปัจจุบัน โดยเฉพาะ <span className="text-blue-600 font-bold italic relative inline-block">ความคุ้มครองน้ำท่วม<span className="absolute bottom-0 left-0 w-full h-1 bg-blue-100 -z-10 rounded"></span></span> ที่กำลังเป็นปัญหาหลัก พร้อมเทคนิคการเลือกซื้อในราคาสุดคุ้ม
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                <button onClick={() => setView('form')} className="btn-shine relative overflow-hidden w-full py-4 bg-[#dc2626] text-white rounded-2xl font-bold text-lg shadow-[0_8px_20px_-6px_rgba(220,38,38,0.5)] hover:bg-red-700 hover:-translate-y-1 transition-all flex items-center justify-center gap-2 group">
                                    <span className="relative z-10">ลงทะเบียนเข้าร่วมอบรม</span>

                            <div className="py-4 text-center border-t border-slate-100 bg-slate-50 relative z-10">

                            </div>
                        </div>
                    </div>
                );
            }

            // --- หน้า 2: Form ---
            if (view === 'form') {
                return (
                    <div className={`min-h-screen flex items-center justify-center p-4 py-10 relative ${isMenuSelectorOpen ? 'overflow-hidden' : ''}`}>
                        
                        {enlargedImage && (
                            <div className="fixed inset-0 z-[60] bg-black/90 flex items-center justify-center p-4 backdrop-blur-sm animate-in fade-in duration-200 cursor-zoom-out" onClick={() => setEnlargedImage(null)}>

                        {errorMsg && (

                                    <div className="flex-1 overflow-y-auto p-4 md:p-6 bg-slate-50 relative">
                                        <div className="flex flex-col sm:flex-row sm:items-center justify-between mb-3 sticky top-0 bg-slate-50/90 backdrop-blur z-20 py-3 border-b border-slate-200/60">
                                            <p className="text-[12px] text-slate-500 font-medium">สามารถใช้นิ้วปัด หรือคลิกลูกศร ซ้าย-ขวา เพื่อดูภาพเพิ่มเติมได้ครับ</p>
                                            <div className="hidden md:flex items-center gap-2 mt-2 sm:mt-0">
                                                <button onClick={slideLeft} className="w-8 h-8 rounded-full bg-white border border-slate-200 hover:bg-slate-100 text-slate-700 font-black flex items-center justify-center shadow-sm">←</button>
                                                <button onClick={slideRight} className="w-8 h-8 rounded-full bg-white border border-slate-200 hover:bg-slate-100 text-slate-700 font-black flex items-center justify-center shadow-sm">→</button>
                                            </div>
                                        </div>
                                        <div ref={scrollRef} className="flex gap-4 overflow-x-auto pb-4 snap-x hide-scroll scroll-smooth">
                                            {["77775555.png", "1778246840708.jpg", "1778246828831.jpg", "1778246833650.jpg", "1778246831082.jpg", "1778246825179.jpg"].map((img, idx) => (
                                                <img 
                                                    key={idx} 
                                                    src={`https://raw.githubusercontent.com/indycom2you-dot/fire-training/main/${img}`} 
                                                    className="h-56 md:h-64 w-auto object-cover rounded-2xl shadow-md snap-center border border-slate-200 shrink-0 cursor-zoom-in hover:opacity-90 transition-opacity" 
                                                    alt="เมนู" 
                                                    onClick={(e) => setEnlargedImage(e.target.src)}
                                                />
                                            ))}
                                        </div>
                                    </div>
                                    <div className="p-4 bg-white border-t shadow-[0_-10px_20px_rgba(0,0,0,0.05)] md:rounded-b-3xl shrink-0 z-20">
                                        <button onClick={() => setIsMenuSelectorOpen(false)} className="w-full py-4 rounded-xl font-bold transition-colors shadow-lg active:scale-95 text-white bg-slate-900 hover:bg-slate-800">
                                            ปิดหน้าต่างรูปภาพ
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="max-w-md w-full bg-white rounded-[32px] shadow-2xl overflow-hidden p-6 md:p-8 animate-in slide-in-from-right-4 duration-300 relative z-10">
                            <button onClick={() => setView('landing')} className="text-sm font-bold text-slate-400 hover:text-slate-600 mb-6 flex items-center gap-1 transition-colors">← ย้อนกลับ</button>
                            <div className="text-center mb-8">
                                <h2 className="text-2xl font-black text-slate-800 mb-1">ลงทะเบียนอบรม</h2>
                                <p className="text-red-600 font-bold text-[15px]">"ประกันรถยนต์ 2+ คุ้มค่า จัดเต็ม"</p>
                                <p className="text-[11px] text-slate-400 mt-4 font-bold tracking-widest border-t pt-4 border-slate-50 uppercase">จัดทำโดย บริษัท พีพีพี อินชัวรันส์ โบรคเกอร์ จำกัด</p>
                            </div>
                            
                            <form onSubmit={handleSubmit} className="space-y-4">
                                <input type="text" placeholder="ชื่อ - นามสกุล *" className="w-full px-5 py-3.5 rounded-xl border border-slate-200 bg-slate-50 outline-none focus:bg-white focus:ring-2 focus:ring-red-500 transition-all font-medium text-slate-700" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                                <input type="text" placeholder="ชื่อเล่น (ถ้ามี)" className="w-full px-5 py-3.5 rounded-xl border border-slate-200 bg-slate-50 outline-none focus:bg-white focus:ring-2 focus:ring-red-500 transition-all font-medium text-slate-700" value={formData.nickname} onChange={e => setFormData({...formData, nickname: e.target.value})} />
                                <input type="text" placeholder="บริษัท / หน่วยงาน *" className="w-full px-5 py-3.5 rounded-xl border border-slate-200 bg-slate-50 outline-none focus:bg-white focus:ring-2 focus:ring-red-500 transition-all font-medium text-slate-700" value={formData.company} onChange={e => setFormData({...formData, company: e.target.value})} />
                                <input type="email" placeholder="อีเมล (ถ้ามี)" className="w-full px-5 py-3.5 rounded-xl border border-slate-200 bg-slate-50 outline-none focus:bg-white focus:ring-2 focus:ring-red-500 transition-all font-medium text-slate-700" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} />
                                <input type="tel" placeholder="เบอร์โทรศัพท์ *" className="w-full px-5 py-3.5 rounded-xl border border-slate-200 bg-slate-50 outline-none focus:bg-white focus:ring-2 focus:ring-red-500 transition-all font-medium text-slate-700" value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} />
                                
                                <div className="bg-slate-50 p-1.5 rounded-2xl flex border border-slate-200 mt-4">
                                    <button type="button" onClick={() => setFormData({...formData, attendance: 'เข้าร่วม'})} className={`flex-1 py-3 rounded-xl font-bold text-sm transition-all ${formData.attendance === 'เข้าร่วม' ? 'bg-white text-red-600 shadow-sm border border-slate-200' : 'text-slate-500 hover:text-slate-700'}`}>เข้าร่วม</button>
                                    <button type="button" onClick={() => { setFormData({...formData, attendance: 'ไม่เข้าร่วม', foodMenu: '', acceptedTerms: false}); setErrorMsg(''); }} className={`flex-1 py-3 rounded-xl font-bold text-sm transition-all ${formData.attendance === 'ไม่เข้าร่วม' ? 'bg-white text-slate-700 shadow-sm border border-slate-200' : 'text-slate-500 hover:text-slate-700'}`}>ไม่เข้าร่วม</button>
                                </div>

                                {formData.attendance === 'เข้าร่วม' && (
                                    <div className="space-y-4 animate-in fade-in pt-4 border-t border-slate-100 mt-4">
                                        <div className="bg-orange-50/50 p-4 rounded-2xl border border-orange-100">
                                            <label className="block text-sm font-bold text-slate-800 mb-3">🍽️ ระบุเมนู ขนม และ เครื่องดื่ม ที่ต้องการ <span className="text-red-500">*</span></label>
                                            <button 
                                                type="button"
                                                onClick={() => setIsMenuSelectorOpen(true)}
                                                className="w-full py-4 mb-3 bg-gradient-to-r from-orange-400 to-amber-500 text-white rounded-xl font-bold shadow-md hover:shadow-lg hover:from-orange-500 hover:to-amber-600 transition-all flex items-center justify-center gap-2"
                                            >
                                                <span className="text-lg">👆</span> คลิกลูกศร ซ้าย-ขวา เพื่อดูภาพเมนู
                                            </button>
                                            <input 
                                                type="text" 
                                                placeholder="พิมพ์เมนูที่ต้องการที่นี่..." 
                                                className="w-full px-5 py-3.5 rounded-xl border border-slate-200 bg-white focus:ring-2 focus:ring-orange-400 outline-none transition-all font-bold text-slate-800 text-sm" 
                                                value={formData.foodMenu} 
                                                onChange={e => setFormData({...formData, foodMenu: e.target.value})} 
                                            />
                                        </div>

                                        <div className="bg-red-50 p-5 rounded-2xl border border-red-100 relative overflow-hidden">
                                            <div className="absolute top-0 right-0 w-16 h-16 bg-red-100 rounded-bl-full -mr-4 -mt-4 z-0"></div>
                                            <p className="text-[13px] font-bold text-red-600 mb-1 relative z-10 flex items-center gap-1"><span className="text-base">📌</span> หมายเหตุ</p>
                                            <p className="text-[12px] text-slate-600 leading-relaxed mb-3 relative z-10">หากลงทะเบียนยืนยันเข้าร่วมแล้ว ไม่มา ขอสงวนสิทธิ์เก็บเงิน 300 บาท <br/>(ค่าสั่งอาหารและเครื่องดื่มล่วงหน้า)</p>
                                            <label className="flex items-start gap-3 cursor-pointer group relative z-10">
                                                <div className="relative flex items-center justify-center mt-0.5">
                                                    <input type="checkbox" className="w-5 h-5 appearance-none border-2 border-slate-300 rounded-md checked:bg-red-600 checked:border-red-600 transition-colors cursor-pointer" checked={formData.acceptedTerms} onChange={(e) => setFormData({...formData, acceptedTerms: e.target.checked})} />
                                                    {formData.acceptedTerms && <span className="absolute text-white pointer-events-none text-xs">✓</span>}
                                                </div>
                                                <span className="text-[13px] font-bold text-slate-800 group-hover:text-red-600 transition-colors">รับทราบและยอมรับเงื่อนไข</span>
                                            </label>
                                        </div>
                                    </div>
                                )}
                                <button type="submit" disabled={loading} className="w-full py-4.5 bg-[#dc2626] text-white rounded-[20px] font-black text-[16px] shadow-xl shadow-red-600/20 hover:bg-red-700 hover:-translate-y-0.5 transition-all mt-6 flex justify-center items-center h-14">
                                    {loading ? <div className="w-6 h-6 border-3 border-white/30 border-t-white rounded-full animate-spin"></div> : "ยืนยันการลงทะเบียน"}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            if (view === 'success') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="max-w-md w-full bg-white p-10 rounded-[32px] shadow-2xl text-center animate-in zoom-in duration-300">
                            <div className="text-6xl mb-6">✅</div>
                            <h2 className="text-2xl font-black mb-2 text-slate-800">บันทึกเรียบร้อย</h2>
                            <p className="text-slate-500 mb-8 font-medium">ระบบได้รับข้อมูลการลงทะเบียนของคุณแล้ว ขอบคุณครับ</p>
                            <button onClick={() => setView('landing')} className="w-full py-4 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl font-bold transition-all">กลับหน้าแรก</button>
                        </div>
                    </div>
                );
            }

            if (view === 'login') {
                return (
                    <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4">
                        <div className="w-full max-w-sm bg-white p-8 rounded-[32px] shadow-2xl">
                            <div className="w-16 h-16 bg-red-50 text-red-600 rounded-2xl flex items-center justify-center mx-auto mb-6 text-2xl">🔐</div>
                            <h2 className="text-2xl font-bold mb-6 text-center text-slate-800">Admin Login</h2>
                            <form onSubmit={handleAdminLogin} className="space-y-4 text-left">
                                <input type="text" placeholder="Username" required className="w-full px-5 py-4 rounded-xl border border-slate-200 outline-none focus:border-red-500 bg-slate-50 font-medium" value={username} onChange={e => setUsername(e.target.value)} />
                                <input type="password" placeholder="Password" required className="w-full px-5 py-4 rounded-xl border border-slate-200 outline-none focus:border-red-500 bg-slate-50 font-medium" value={password} onChange={e => setPassword(e.target.value)} />
                                <button type="submit" disabled={loading} className="w-full py-4 bg-red-600 text-white rounded-xl font-bold shadow-lg hover:bg-red-700 transition-all">{loading ? 'กำลังตรวจสอบ...' : 'เข้าสู่ระบบ'}</button>
                                <button type="button" onClick={() => setView('landing')} className="w-full text-slate-400 hover:text-slate-600 text-sm mt-4 font-semibold text-center block w-full">← กลับหน้าหลัก</button>
                            </form>
                        </div>
                    </div>
                );
            }

            if (view === 'admin') {
                return (
                    <div className="min-h-screen bg-slate-50">
                        <nav className="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
                            <div className="font-black text-red-600 text-lg">PPP Admin Dashboard</div>
                            <button onClick={handleLogout} className="text-sm font-bold text-slate-500 hover:text-red-600 transition-colors bg-slate-50 px-4 py-2 rounded-lg">ออกจากระบบ</button>
                        </nav>
                        <div className="max-w-7xl mx-auto px-4 py-8 animate-in fade-in slide-in-from-bottom-4">
                            <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                                <h1 className="text-xl font-black">รายชื่อผู้ลงทะเบียน ({registrations.length})</h1>
                                <button onClick={exportExcel} className="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-xl font-bold shadow-md transition-all">📥 โหลดข้อมูลเป็น Excel</button>
                            </div>
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden overflow-x-auto">
                                <table className="w-full text-left whitespace-nowrap">
                                    <thead className="bg-slate-50 border-b border-slate-200 text-xs font-bold text-slate-500 uppercase">
                                        <tr>
                                            <th className="px-6 py-4">ลำดับ</th>
                                            <th className="px-6 py-4">ชื่อ-นามสกุล / ชื่อเล่น</th>
                                            <th className="px-6 py-4">บริษัท</th>
                                            <th className="px-6 py-4">เบอร์โทร / อีเมล</th>
                                            <th className="px-6 py-4 text-center">สถานะ</th>
                                            <th className="px-6 py-4">เมนูที่เลือก</th>
                                            <th className="px-6 py-4 text-right">ลบ</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100 text-sm">
                                        {registrations.map((r, i) => (
                                            <tr key={r.id} className="hover:bg-slate-50 transition-colors">
                                                <td className="px-6 py-4 text-slate-400 font-bold">{i + 1}</td>
                                                <td className="px-6 py-4">
                                                    <div className="font-bold text-slate-800">{r.name}</div>
                                                    <div className="text-xs text-slate-500">{r.nickname ? `(${r.nickname})` : '-'}</div>
                                                </td>
                                                <td className="px-6 py-4 text-slate-600 font-medium">{r.company}</td>
                                                <td className="px-6 py-4">
                                                    <div className="font-bold text-slate-700">{r.phone}</div>
                                                    <div className="text-xs text-slate-500">{r.email || '-'}</div>
                                                </td>
                                                <td className="px-6 py-4 text-center">
                                                    <span className={`px-3 py-1 rounded-full text-[11px] font-bold ${r.attendance === 'เข้าร่วม' ? 'bg-red-100 text-red-700' : 'bg-slate-100 text-slate-500'}`}>{r.attendance}</span>
                                                </td>
                                                <td className="px-6 py-4">
                                                    {r.attendance === 'เข้าร่วม' ? (
                                                        <div className="text-xs font-bold text-indigo-700 bg-indigo-50 px-3 py-1.5 rounded-lg border border-indigo-100 inline-block max-w-[200px] truncate" title={r.foodMenu}>
                                                            {r.foodMenu || '-'}
                                                        </div>
                                                    ) : (
                                                        <span className="text-slate-300 font-bold">-</span>
                                                    )}
                                                </td>
                                                <td className="px-6 py-4 text-right">
                                                    <button onClick={() => handleDelete(r.id)} className="text-slate-300 hover:text-red-500 font-bold text-lg p-2 rounded-lg hover:bg-red-50 transition-colors">🗑️</button>
                                                </td>
                                            </tr>
                                        ))}
                                        {registrations.length === 0 && (
                                            <tr><td colSpan="7" className="py-12 text-center text-slate-400 font-bold">ยังไม่มีข้อมูลผู้ลงทะเบียน</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            }
            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
