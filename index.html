<!DOCTYPE html>
<html lang="th">

    <title>ลงทะเบียนสัมมนา - ประกันรถยนต์ 2+ PPP Insurance</title>
    <script src="https://cdn.tailwindcss.com"></script>

        ::-webkit-scrollbar-track { background: #f1f5f9; }

        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class={view === 'form' && isMenuSelectorOpen ? "overflow-hidden" : ""}>
    <div id="root"></div>

    <!-- Firebase SDK (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- ไลบรารีสร้างไฟล์ Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyC9-6NepYeoyU4-pluImdIcNBV6H7ThLas",
            authDomain: "ppp-registration.firebaseapp.com",
            projectId: "ppp-registration",
            storageBucket: "ppp-registration.firebasestorage.app",
            messagingSenderId: "1072711188640",
            appId: "1:1072711188640:web:e639ef36b32ea637ab09c5",
            measurementId: "G-Z0XFPK8CJ7"
        };

        // 🟢 เปลี่ยนจาก Object รูปภาพ เป็นชื่อเมนูล้วนๆ เพื่อความสะอาดตา
        const menuData = {
            desserts: ["บานอฟฟี่", "พานาคอตต้า", "เค้กส้ม", "คัสตาร์ด", "เค้กฝอยทอง", "เค้กนมสด"],
            drinks: {
                "☕ หมวดกาแฟ (Coffee)": ["อเมริกาโน", "ลาเต้", "เอสเพรสโซ่", "มอคคา", "คาปูชิโน่", "อเมริกาโน่น้ำผึ้งมะนาว", "อเมริกาโน่น้ำส้ม", "อเมริกาโน่น้ำมะพร้าว"],
                "🍵 หมวดชาและนม": ["ชาไทย", "ชาเขียว", "ชามิกซ์", "โกโก้", "โกโก้พิงค์", "นมชมพู", "นมสดสตรอเบอรี่", "นมสดสตรอเบอรี่ชาไทย", "นมสดสตรอเบอรี่ชาเขียว", "นมสดสตรอเบอรี่โกโก้", "สตรอเบอรี่ลาเต้", "สตรอเบอรี่ช็อคมิ้นท์"],
                "🍓 หมวดสมูทตี้ปั่น": ["สตอเบอรี่สมูทตี้โยเกิร์ต", "สตอเบอรี่สมูทตี้", "มิกซ์เบอรี่สมูทตี้", "อาโวคาโดนมสดน้ำผึ้ง", "แตงโมปั่นไร้น้ำแข็ง", "ลิ้นจี่ปั่น", "เสาวรสสดปั่น"],
                "🍹 หมวดอิตาเลี่ยนโซดา": ["มะนาวน้ำผึ้งโซดา", "บลูเบอรี่โซดา", "ลิ้นจี่โซดา", "เขียวโซดา", "บลูฮาวายโซดา", "แดงโซดา", "สตรอเบอรี่โซดา"]
            }
        };

        // 🟢 รายการรูปภาพสำหรับสไลด์โชว์ด้านบน
        const overviewImages = [
            "https://raw.githubusercontent.com/indycom2you-dot/fire-training/main/77775555.png",
            "https://raw.githubusercontent.com/indycom2you-dot/fire-training/main/1778246828831.jpg",
            "https://raw.githubusercontent.com/indycom2you-dot/fire-training/main/1778246840708.jpg",
            "https://raw.githubusercontent.com/indycom2you-dot/fire-training/main/1778246833650.jpg",
            "https://raw.githubusercontent.com/indycom2you-dot/fire-training/main/1778246831082.jpg",
            "https://raw.githubusercontent.com/indycom2you-dot/fire-training/main/1778246825179.jpg"
        ];

        const App = () => {
            const [view, setView] = React.useState('landing'); 
            const [user, setUser] = React.useState(null);
            const [registrations, setRegistrations] = React.useState([]);
            const [loading, setLoading] = React.useState(false);
            const [errorMsg, setErrorMsg] = React.useState('');
            const [username, setUsername] = React.useState('');
            const [password, setPassword] = React.useState('');
            
            // State สำหรับระบบเลือกเมนู
            const [isMenuSelectorOpen, setIsMenuSelectorOpen] = React.useState(false);
            const [tempDessert, setTempDessert] = React.useState('');
            const [tempDrink, setTempDrink] = React.useState('');
            
            // 🟢 State สำหรับเก็บรูปภาพที่ถูกกดขยาย
            const [enlargedImage, setEnlargedImage] = React.useState(null);

            // 🟢 Ref สำหรับปุ่มเลื่อนเมนูภาพซ้าย-ขวาบน PC
            const scrollRef = React.useRef(null);

            const [formData, setFormData] = React.useState({
                name: '', nickname: '', company: '', email: '', phone: '',
                attendance: 'เข้าร่วม', foodMenu: '', acceptedTerms: false
            });

            React.useEffect(() => {
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                const auth = firebase.auth();
                const db = firebase.firestore();

                const initAuth = async () => {
                    if (!auth.currentUser) {
                        try { await auth.signInAnonymously(); } catch(e) { console.error("Auth init error:", e); }
                    }
                };
                initAuth();

                let unsubscribeData = null;
                const unsubscribeAuth = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    if (unsubscribeData) { unsubscribeData(); unsubscribeData = null; }
                    if (u && !u.isAnonymous) {
                        setView('admin');
                        unsubscribeData = db.collection('registrations')
                            .onSnapshot((snapshot) => {
                                const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                                items.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                                setRegistrations(items);
                            });
                    }
                });
                return () => { unsubscribeAuth(); if (unsubscribeData) unsubscribeData(); };
            }, []);

            const handleSubmit = async (e) => {
                e.preventDefault();
                
                // --- ระบบตรวจสอบข้อมูล (Validation) แบบกำหนดเอง (จะเด้งป๊อปอัป) ---
                if (!formData.name.trim()) { setErrorMsg('กรุณากรอก "ชื่อ - นามสกุล" ด้วยครับ'); return; }
                if (!formData.company.trim()) { setErrorMsg('กรุณากรอก "บริษัท / หน่วยงาน" ด้วยครับ'); return; }
                if (!formData.phone.trim()) { setErrorMsg('กรุณากรอก "เบอร์โทรศัพท์" ด้วยครับ'); return; }

                if (formData.attendance === 'เข้าร่วม') {
                    if (!formData.foodMenu.trim()) { setErrorMsg('กรุณาเลือกเมนู ขนม และ เครื่องดื่ม ด้วยครับ\n(สามารถกดปุ่มสีส้มด้านบนเพื่อจิ้มเลือกจากรูปได้เลยครับ)'); return; }
                    if (!formData.acceptedTerms) { setErrorMsg('กรุณาติ๊กเครื่องหมายถูกที่ช่อง "รับทราบและยอมรับเงื่อนไข" ก่อนกดยืนยันครับ'); return; }
                }

                setLoading(true);
                setErrorMsg('');
                try {
                    const db = firebase.firestore();
                    
                    const phoneCheck = await db.collection('registrations').where('phone', '==', formData.phone).get();
                    if (!phoneCheck.empty) {
                        setErrorMsg('เบอร์โทรศัพท์นี้ถูกใช้ลงทะเบียนไปแล้วครับ');
                        setLoading(false);
                        return;
                    }

                    await db.collection('registrations').add({
                        ...formData,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setView('success');
                    setFormData({ name: '', nickname: '', company: '', email: '', phone: '', attendance: 'เข้าร่วม', foodMenu: '', acceptedTerms: false });
                } catch (err) { setErrorMsg("เกิดข้อผิดพลาดในการเชื่อมต่อ กรุณาลองใหม่อีกครั้ง"); }
                setLoading(false);
            };

            const handleAdminLogin = async (e) => {
                e.preventDefault();
                setLoading(true); setErrorMsg('');
                try {
                    const loginEmail = username.includes('@') ? username : `${username}@ppp.com`;
                    await firebase.auth().signInWithEmailAndPassword(loginEmail, password);
                } catch (err) { setErrorMsg("ข้อมูลไม่ถูกต้อง"); }
                setLoading(false);
            };

            const handleLogout = async () => {
                try {
                    await firebase.auth().signOut();
                    setView('landing'); setUsername(''); setPassword('');
                    await firebase.auth().signInAnonymously(); 
                } catch (err) { console.error("Logout Error:", err); }
            };

            const handleDelete = async (id) => {
                if (window.confirm("คุณต้องการลบข้อมูลผู้ลงทะเบียนรายนี้ใช่หรือไม่?")) {
                    try { await firebase.firestore().collection('registrations').doc(id).delete(); } 
                    catch (err) { alert("ลบข้อมูลไม่สำเร็จ: " + err.message); }
                }
            };

            // 🟢 ฟังก์ชันเลื่อนภาพซ้าย-ขวา
            const slideLeft = () => scrollRef.current && scrollRef.current.scrollBy({ left: -300, behavior: 'smooth' });
            const slideRight = () => scrollRef.current && scrollRef.current.scrollBy({ left: 300, behavior: 'smooth' });

            const confirmMenuSelection = () => {
                if (!tempDessert && !tempDrink) {
                    alert('กรุณาเลือกเมนูอย่างน้อย 1 อย่างครับ');
                    return;
                }
                
                let combinedMenu = '';
                if (tempDessert && tempDrink) {
                    combinedMenu = `${tempDessert} + ${tempDrink}`;
                } else if (tempDessert) {
                    combinedMenu = tempDessert;
                } else if (tempDrink) {
                    combinedMenu = tempDrink;
                }

                setFormData({...formData, foodMenu: combinedMenu});
                setIsMenuSelectorOpen(false);
            };

            const exportExcel = async () => {
                if (registrations.length === 0) { alert("ไม่มีข้อมูลให้ Export ครับ"); return; }
                
                const workbook = new ExcelJS.Workbook();
                const sheet = workbook.addWorksheet('รายชื่อผู้ลงทะเบียน', { 
                    views: [{ showGridLines: false, state: 'frozen', xSplit: 0, ySplit: 3 }] 
                });

                sheet.columns = [
                    { header: 'ลำดับ', key: 'index', width: 6 },
                    { header: 'ชื่อ-นามสกุล', key: 'name', width: 22 },
                    { header: 'ชื่อเล่น', key: 'nickname', width: 10 },
                    { header: 'บริษัท / หน่วยงาน', key: 'company', width: 24 },
                    { header: 'เบอร์โทรศัพท์', key: 'phone', width: 15 },
                    { header: 'อีเมล', key: 'email', width: 28 },
                    { header: 'สถานะ', key: 'attendance', width: 10 },
                    { header: 'เมนู ขนม/เครื่องดื่ม', key: 'foodMenu', width: 35 }, 
                    { header: 'วันที่บันทึก', key: 'date', width: 18 }
                ];

                sheet.spliceRows(1, 0, [], []);

                sheet.mergeCells('A1:I1');
                const titleCell = sheet.getCell('A1');
                titleCell.value = 'รายงานผู้ลงทะเบียนสัมมนา: ประกันรถยนต์ 2+ คุ้มค่า จัดเต็ม';
                titleCell.font = { name: 'Sarabun', size: 14, bold: true, color: { argb: 'FFFFFFFF' } }; 
                titleCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFB91C1C' } }; 
                titleCell.alignment = { vertical: 'middle', horizontal: 'center' };
                sheet.getRow(1).height = 35; 

                sheet.mergeCells('A2:I2');
                const metaCell = sheet.getCell('A2');
                metaCell.value = `ข้อมูลอัปเดตล่าสุด ณ วันที่: ${new Date().toLocaleString('th-TH')} | จัดทำโดย: บริษัท พีพีพี อินชัวรันส์ โบรคเกอร์ จำกัด`;
                metaCell.font = { name: 'Sarabun', size: 9, italic: true, color: { argb: 'FF475569' } }; 
                metaCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF1F5F9' } };
                metaCell.alignment = { vertical: 'middle', horizontal: 'right', indent: 1 };
                sheet.getRow(2).height = 18;

                const headerRow = sheet.getRow(3);
                headerRow.eachCell((cell) => {
                    cell.font = { name: 'Sarabun', size: 10, bold: true, color: { argb: 'FFFFFFFF' } }; 
                    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFDC2626' } }; 
                    cell.alignment = { vertical: 'middle', horizontal: 'center' };
                    cell.border = { top: {style:'thin', color:{argb:'FFB91C1C'}}, left: {style:'thin', color:{argb:'FFB91C1C'}}, bottom: {style:'thin', color:{argb:'FFB91C1C'}}, right: {style:'thin', color:{argb:'FFB91C1C'}} };
                });
                headerRow.height = 25; 
                sheet.autoFilter = 'A3:I3'; 

                registrations.forEach((r, idx) => {
                    const row = sheet.addRow({
                        index: idx + 1, name: r.name, nickname: r.nickname || '-', company: r.company,
                        phone: r.phone, email: r.email || '-', attendance: r.attendance, foodMenu: r.foodMenu || '-',
                        date: r.createdAt?.toDate().toLocaleString('th-TH') || '-'
                    });

                    row.eachCell((cell, colNumber) => {
                        cell.font = { name: 'Sarabun', size: 10, color: { argb: 'FF1E293B' } }; 
                        cell.border = { top: {style:'thin', color:{argb:'FFE2E8F0'}}, left: {style:'thin', color:{argb:'FFE2E8F0'}}, bottom: {style:'thin', color:{argb:'FFE2E8F0'}}, right: {style:'thin', color:{argb:'FFE2E8F0'}} };
                        
                        if ([1, 3, 5, 7, 9].includes(colNumber)) {
                            cell.alignment = { vertical: 'middle', horizontal: 'center', wrapText: true };
                        } else {
                            cell.alignment = { vertical: 'middle', horizontal: 'left', indent: 1, wrapText: true };
                        }
                        
                        if (idx % 2 === 1) cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF8FAFC' } };
                        
                        if (colNumber === 7) {
                            if (r.attendance === 'เข้าร่วม') cell.font = { name: 'Sarabun', size: 10, bold: true, color: { argb: 'FF15803D' } }; 
                            else cell.font = { name: 'Sarabun', size: 10, bold: true, color: { argb: 'FF94A3B8' } }; 
                        }
                    });
                    row.height = 22; 
                });

                const buffer = await workbook.xlsx.writeBuffer();
                const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                saveAs(blob, `รายงานลงทะเบียน_รถยนต์2พลัส_${new Date().toISOString().slice(0, 10)}.xlsx`);
            };

            if (view === 'landing') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-slate-100 overflow-hidden relative">
                        <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-red-400/20 rounded-full blur-3xl animate-pulse"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-indigo-400/20 rounded-full blur-3xl animate-pulse" style={{animationDelay: '1.5s'}}></div>

                        <div className="max-w-md w-full bg-white rounded-[32px] shadow-2xl overflow-hidden relative animate-in fade-in zoom-in-95 duration-700">
                            
                            <div className="h-48 sm:h-56 w-full relative bg-slate-800 overflow-hidden group cursor-default">
                                <img src="./cover.png" alt="Cover" className="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110" onError={(e) => {e.target.src="https://images.unsplash.com/photo-1502877338535-766e1452684a?q=80&w=800"}} />
                                <div className="absolute inset-0 bg-gradient-to-t from-slate-900/60 to-transparent"></div>
                            </div>

                            <div className="p-6 sm:p-8 relative z-10 -mt-6 bg-white rounded-t-[32px]">
                                <h1 className="text-xl sm:text-2xl md:text-3xl font-black text-slate-800 leading-tight mb-2 bg-clip-text text-transparent bg-gradient-to-r from-slate-900 to-slate-600">
                                    ประกันรถยนต์ 2+ คุ้มค่า จัดเต็ม
                                </h1>
                                <p className="text-red-600 font-bold text-base sm:text-lg mb-6 sm:mb-8 inline-block border-b-2 border-red-100 pb-1">เน้นความคุ้มครองน้ำท่วม ในราคาสุดคุ้ม</p>
                                
                                <div className="space-y-3 mb-8">
                                    <div className="flex items-start gap-3 sm:gap-4 group p-2 -m-2 rounded-2xl hover:bg-slate-50 transition-colors cursor-default">
                                        <div className="w-9 h-9 sm:w-10 sm:h-10 shrink-0 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center text-lg sm:text-xl group-hover:scale-110 group-hover:rotate-3 transition-transform shadow-sm">🗓️</div>
                                        <div className="text-[14px] sm:text-[15px] flex w-full leading-relaxed pt-1">
                                            <div className="font-bold text-slate-800 w-[70px] sm:w-[80px] shrink-0">วันที่:</div>
                                            <div className="font-medium text-slate-600 flex-1">12 พฤษภาคม 2569</div>
                                        </div>
                                    </div>
                                    <div className="flex items-start gap-3 sm:gap-4 group p-2 -m-2 rounded-2xl hover:bg-slate-50 transition-colors cursor-default">
                                        <div className="w-9 h-9 sm:w-10 sm:h-10 shrink-0 bg-rose-100 text-rose-600 rounded-xl flex items-center justify-center text-lg sm:text-xl group-hover:scale-110 group-hover:-rotate-3 transition-transform shadow-sm">⏰</div>
                                        <div className="text-[14px] sm:text-[15px] flex w-full leading-relaxed pt-1">
                                            <div className="font-bold text-slate-800 w-[70px] sm:w-[80px] shrink-0">เวลา:</div>
                                            <div className="flex flex-col flex-1">
                                                <span className="font-medium text-slate-600">ลงทะเบียน 10.00 น.</span>
                                                <span className="font-bold text-red-600 mt-0.5">เริ่มประชุม 10.30 น.</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex items-start gap-3 sm:gap-4 group p-2 -m-2 rounded-2xl hover:bg-slate-50 transition-colors cursor-default">
                                        <div className="w-9 h-9 sm:w-10 sm:h-10 shrink-0 bg-emerald-100 text-emerald-600 rounded-xl flex items-center justify-center text-lg sm:text-xl group-hover:scale-110 group-hover:rotate-3 transition-transform shadow-sm">📍</div>
                                        <div className="text-[14px] sm:text-[15px] flex w-full leading-relaxed pt-1">
                                            <div className="font-bold text-slate-800 w-[70px] sm:w-[80px] shrink-0">สถานที่:</div>
                                            <div className="font-medium text-slate-600 flex-1">ร้าน ณ คุณ</div>
                                        </div>
                                    </div>
                                    <div className="flex items-start gap-3 sm:gap-4 group p-2 -m-2 rounded-2xl hover:bg-slate-50 transition-colors cursor-default">
                                        <div className="w-9 h-9 sm:w-10 sm:h-10 shrink-0 bg-purple-100 text-purple-600 rounded-xl flex items-center justify-center text-lg sm:text-xl group-hover:scale-110 group-hover:-rotate-3 transition-transform shadow-sm">🎤</div>
                                        <div className="text-[14px] sm:text-[15px] flex w-full leading-relaxed pt-1">
                                            <div className="font-bold text-slate-800 w-[70px] sm:w-[80px] shrink-0">วิทยากร:</div>
                                            <div className="flex flex-col flex-1 text-slate-800">
                                                <span className="font-bold">คุณณัฐพัตร์ เพ็ชรสุวรรณ (คุณวี)</span>
                                                <span className="text-[12px] sm:text-[13px] font-bold text-slate-500 mt-1 leading-snug">บริษัท CHUBB</span>
                                            </div>
                                        </div>
                                    </div>

                                <div>
                                    <h1 className="text-2xl md:text-3xl font-black text-slate-800 tracking-tight">Executive Dashboard</h1>
                                    <p className="text-sm text-slate-500 mt-1 font-medium">ภาพรวมข้อมูลผู้ลงทะเบียนสัมมนา "ประกันรถยนต์ 2+"</p>
                                </div>
                                <button onClick={exportExcel} className="flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-xl font-bold shadow-lg shadow-emerald-600/20 transition-all hover:-translate-y-1 w-full md:w-auto">
                                    <span className="text-lg">📥</span> โหลด Excel
                                </button>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6 mb-8">
                                <div className="bg-white rounded-2xl p-6 border border-slate-100 shadow-sm flex items-center justify-between border-l-4 border-l-blue-500 hover:shadow-md transition-shadow">
                                    <div>
                                        <p className="text-xs font-extrabold text-slate-400 uppercase tracking-widest mb-1">ลงทะเบียนทั้งหมด</p>
                                        <div className="flex items-baseline gap-1"><span className="text-4xl font-black text-slate-800">{totalReg}</span><span className="text-sm font-bold text-slate-400">ท่าน</span></div>
                                    </div>
                                    <div className="w-12 h-12 rounded-full bg-blue-50 flex items-center justify-center text-2xl">👥</div>
                                </div>
                                <div className="bg-white rounded-2xl p-6 border border-slate-100 shadow-sm flex items-center justify-between border-l-4 border-l-emerald-500 hover:shadow-md transition-shadow">
                                    <div>
                                        <p className="text-xs font-extrabold text-emerald-500 uppercase tracking-widest mb-1">ยืนยันเข้าร่วม</p>
                                        <div className="flex items-baseline gap-1"><span className="text-4xl font-black text-emerald-600">{attending}</span><span className="text-sm font-bold text-emerald-400">ท่าน</span></div>
                                    </div>
                                    <div className="w-12 h-12 rounded-full bg-emerald-50 flex items-center justify-center text-2xl">✅</div>
                                </div>
                                <div className="bg-white rounded-2xl p-6 border border-slate-100 shadow-sm flex items-center justify-between border-l-4 border-l-slate-400 hover:shadow-md transition-shadow">
                                    <div>
                                        <p className="text-xs font-extrabold text-slate-400 uppercase tracking-widest mb-1">ไม่เข้าร่วม</p>
                                        <div className="flex items-baseline gap-1"><span className="text-4xl font-black text-slate-600">{notAttending}</span><span className="text-sm font-bold text-slate-400">ท่าน</span></div>
                                    </div>
                                    <div className="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center text-2xl">❌</div>
                                </div>
                            </div>

                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                <div className="p-5 border-b border-slate-100 bg-slate-50 flex items-center gap-2">
                                    <span className="text-lg">📋</span>
                                    <h3 className="font-bold text-slate-700">รายชื่อผู้ลงทะเบียนรายละเอียด</h3>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left whitespace-nowrap">
                                        <thead className="bg-white border-b border-slate-200">
                                            <tr>
                                                <th className="px-6 py-4 text-[11px] font-extrabold text-slate-400 uppercase tracking-wider">ชื่อ-นามสกุล / บริษัท</th>
                                                <th className="px-6 py-4 text-[11px] font-extrabold text-slate-400 uppercase tracking-wider">ข้อมูลการติดต่อ</th>
                                                <th className="px-6 py-4 text-[11px] font-extrabold text-slate-400 uppercase tracking-wider text-center">สถานะ</th>
                                                <th className="px-6 py-4 text-[11px] font-extrabold text-slate-400 uppercase tracking-wider">เมนูอาหาร/เครื่องดื่ม</th>
                                                <th className="px-6 py-4 text-[11px] font-extrabold text-slate-400 uppercase tracking-wider text-right">จัดการ</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {registrations.map(r => (
                                                <tr key={r.id} className="hover:bg-slate-50 transition-colors group">
                                                    <td className="px-6 py-4">
                                                        <div className="font-bold text-slate-800 text-sm">{r.name} <span className="text-slate-400 font-medium text-xs ml-1">{r.nickname ? `(${r.nickname})` : ''}</span></div>
                                                        <div className="text-xs text-slate-500 font-medium flex items-center gap-1 mt-1"><span className="text-[10px]">🏢</span> {r.company}</div>
                                                    </td>
                                                    <td className="px-6 py-4">
                                                        <div className="font-bold text-slate-700 text-sm flex items-center gap-1">📞 {r.phone}</div>
                                                        {r.email && <div className="text-xs text-slate-500 mt-1 flex items-center gap-1">✉️ {r.email}</div>}
                                                    </td>
                                                    <td className="px-6 py-4 text-center">
                                                        <span className={`inline-flex items-center gap-1 px-3 py-1 rounded-full text-[11px] font-bold ${r.attendance === 'เข้าร่วม' ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-500'}`}>
                                                            {r.attendance === 'เข้าร่วม' ? '✅ เข้าร่วม' : '❌ ไม่ร่วม'}
                                                        </span>
                                                    </td>
                                                    <td className="px-6 py-4">
                                                        {r.attendance === 'เข้าร่วม' ? (
                                                            <div className="text-sm font-bold text-indigo-700 bg-indigo-50 px-3 py-1.5 rounded-lg border border-indigo-100 inline-block max-w-[250px] truncate" title={r.foodMenu}>
                                                                🍽️ {r.foodMenu || '-'}
                                                            </div>
                                                        ) : (
                                                            <span className="text-slate-300 font-bold">-</span>
                                                        )}
                                                    </td>
                                                    <td className="px-6 py-4 text-right">
                                                        <button 
                                                            onClick={() => handleDelete(r.id)} 
                                                            className="inline-flex items-center justify-center gap-1 px-3 py-1.5 rounded-lg text-xs font-bold text-slate-400 hover:text-red-600 hover:bg-red-50 transition-all border border-transparent hover:border-red-100"
                                                        >
                                                            🗑️ ลบ
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                            {registrations.length === 0 && (
                                                <tr>
                                                    <td colSpan="5" className="px-6 py-16 text-center text-slate-400 font-bold bg-slate-50/50">
                                                        <div className="text-4xl mb-2">📭</div>
                                                        ยังไม่มีข้อมูลผู้ลงทะเบียน
                                                    </td>
                                                </tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }
            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
