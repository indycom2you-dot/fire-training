<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนสัมมนา - ประกันรถยนต์ 2+ PPP Insurance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
        .glass-effect { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDK (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- เพิ่มไลบรารีสร้างไฟล์ Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyC9-6NepYeoyU4-pluImdIcNBV6H7ThLas",
            authDomain: "ppp-registration.firebaseapp.com",
            projectId: "ppp-registration",
            storageBucket: "ppp-registration.firebasestorage.app",
            messagingSenderId: "1072711188640",
            appId: "1:1072711188640:web:e639ef36b32ea637ab09c5",
            measurementId: "G-Z0XFPK8CJ7"
        };

        const App = () => {
            const [view, setView] = React.useState('landing'); 
            const [user, setUser] = React.useState(null);
            const [registrations, setRegistrations] = React.useState([]);
            const [loading, setLoading] = React.useState(false);
            const [errorMsg, setErrorMsg] = React.useState('');
            const [username, setUsername] = React.useState('');
            const [password, setPassword] = React.useState('');

            const [formData, setFormData] = React.useState({
                name: '',
                nickname: '',
                company: '',
                email: '',
                phone: '',
                attendance: 'เข้าร่วม',
                foodMenu: '',
                acceptedTerms: false
            });

            React.useEffect(() => {
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                const auth = firebase.auth();
                const db = firebase.firestore();

                const initAuth = async () => {
                    if (!auth.currentUser) {
                        try { await auth.signInAnonymously(); } catch(e) { console.error("Auth init error:", e); }
                    }
                };
                initAuth();

                let unsubscribeData = null;
                const unsubscribeAuth = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    if (unsubscribeData) { unsubscribeData(); unsubscribeData = null; }
                    if (u && !u.isAnonymous) {
                        setView('admin');
                        unsubscribeData = db.collection('registrations')
                            .onSnapshot((snapshot) => {
                                const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                                items.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                                setRegistrations(items);
                            });
                    }
                });
                return () => { unsubscribeAuth(); if (unsubscribeData) unsubscribeData(); };
            }, []);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (formData.attendance === 'เข้าร่วม') {
                    if (!formData.acceptedTerms) { setErrorMsg('กรุณากดยอมรับเงื่อนไขครับ'); return; }
                    if (!formData.foodMenu.trim()) { setErrorMsg('กรุณาระบุเมนู ขนม และ เครื่องดื่ม ครับ'); return; }
                }
                setLoading(true);
                try {
                    const db = firebase.firestore();
                    
                    // --- ระบบเช็คเบอร์โทรศัพท์ซ้ำ ---
                    const phoneCheck = await db.collection('registrations').where('phone', '==', formData.phone).get();
                    if (!phoneCheck.empty) {
                        setErrorMsg('เบอร์โทรศัพท์นี้ถูกใช้ลงทะเบียนไปแล้วครับ');
                        setLoading(false);
                        return;
                    }
                    // -----------------------------

                    await db.collection('registrations').add({
                        ...formData,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setView('success');
                    setFormData({ name: '', nickname: '', company: '', email: '', phone: '', attendance: 'เข้าร่วม', foodMenu: '', acceptedTerms: false });
                } catch (err) { setErrorMsg("เกิดข้อผิดพลาด: " + err.message); }
                setLoading(false);
            };

            const handleAdminLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const loginEmail = username.includes('@') ? username : `${username}@ppp.com`;
                    await firebase.auth().signInWithEmailAndPassword(loginEmail, password);
                } catch (err) { setErrorMsg("ข้อมูลไม่ถูกต้อง"); }
                setLoading(false);
            };

            const handleDelete = async (id) => {
                if (window.confirm("คุณต้องการลบข้อมูลผู้ลงทะเบียนรายนี้ใช่หรือไม่?")) {
                    try {
                        await firebase.firestore().collection('registrations').doc(id).delete();
                    } catch (err) {
                        alert("ลบข้อมูลไม่สำเร็จ: " + err.message);
                    }
                }
            };

            const exportExcel = async () => {
                if (registrations.length === 0) {
                    alert("ไม่มีข้อมูลให้ Export ครับ");
                    return;
                }
                
                const workbook = new ExcelJS.Workbook();
                const sheet = workbook.addWorksheet('รายชื่อผู้ลงทะเบียน', { 
                    // แช่แข็ง 3 แถวบนสุด (Freeze Panes) ให้หัวตารางตามไปทุกหน้า
                    views: [{ showGridLines: false, state: 'frozen', xSplit: 0, ySplit: 3 }] 
                });

                // 1. ตั้งค่าความกว้างคอลัมน์ (ปรับให้แคบลงอีกนิดให้พอดีกับฟอนต์ที่เล็กลง)
                sheet.columns = [
                    { header: 'ลำดับ', key: 'index', width: 6 },
                    { header: 'ชื่อ-นามสกุล', key: 'name', width: 20 },
                    { header: 'ชื่อเล่น', key: 'nickname', width: 10 },
                    { header: 'บริษัท / หน่วยงาน', key: 'company', width: 24 },
                    { header: 'เบอร์โทรศัพท์', key: 'phone', width: 14 },
                    { header: 'อีเมล', key: 'email', width: 20 },
                    { header: 'สถานะ', key: 'attendance', width: 10 },
                    { header: 'เมนู ขนม/เครื่องดื่ม', key: 'foodMenu', width: 22 },
                    { header: 'วันที่บันทึก', key: 'date', width: 16 }
                ];

                // 2. ดันแถวหัวตารางลงไปอยู่บรรทัดที่ 3 เพื่อเพิ่มที่ว่างให้หัวกระดาษ
                sheet.spliceRows(1, 0, [], []);

                // 3. ตกแต่งหัวกระดาษ (บรรทัดที่ 1-2) ให้ดูพรีเมียม
                sheet.mergeCells('A1:I1');
                const titleCell = sheet.getCell('A1');
                titleCell.value = 'รายงานผู้ลงทะเบียนสัมมนา: ประกันรถยนต์ 2+ คุ้มค่า จัดเต็ม';
                titleCell.font = { name: 'Sarabun', size: 14, bold: true, color: { argb: 'FFFFFFFF' } }; // ลดฟอนต์หัวข้อ
                titleCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFB91C1C' } }; // สีแดงเข้ม
                titleCell.alignment = { vertical: 'middle', horizontal: 'center' };
                sheet.getRow(1).height = 35; // ลดความสูงหัวข้อ

                sheet.mergeCells('A2:I2');
                const metaCell = sheet.getCell('A2');
                metaCell.value = `ข้อมูลอัปเดตล่าสุด ณ วันที่: ${new Date().toLocaleString('th-TH')} | จัดทำโดย: บริษัท พีพีพี อินชัวรันส์ โบรคเกอร์ จำกัด`;
                metaCell.font = { name: 'Sarabun', size: 9, italic: true, color: { argb: 'FF475569' } }; // ลดฟอนต์คำอธิบาย
                metaCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF1F5F9' } };
                metaCell.alignment = { vertical: 'middle', horizontal: 'right', indent: 1 };
                sheet.getRow(2).height = 18;

                // 4. ตกแต่งหัวตาราง (บรรทัดที่ 3) และเปิดระบบ Filter
                const headerRow = sheet.getRow(3);
                headerRow.eachCell((cell) => {
                    cell.font = { name: 'Sarabun', size: 10, bold: true, color: { argb: 'FFFFFFFF' } }; // ลดฟอนต์หัวตารางเป็น 10
                    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFDC2626' } }; // สีแดง
                    cell.alignment = { vertical: 'middle', horizontal: 'center' };
                    cell.border = { top: {style:'thin', color:{argb:'FFB91C1C'}}, left: {style:'thin', color:{argb:'FFB91C1C'}}, bottom: {style:'thin', color:{argb:'FFB91C1C'}}, right: {style:'thin', color:{argb:'FFB91C1C'}} };
                });
                headerRow.height = 25; // ลดความสูงหัวตาราง
                sheet.autoFilter = 'A3:I3'; // เปิดปุ่มลูกศรกรองข้อมูล (Auto-Filter)

                // 5. ใส่ข้อมูลลูกค้า
                registrations.forEach((r, idx) => {
                    const row = sheet.addRow({
                        index: idx + 1,
                        name: r.name,
                        nickname: r.nickname || '-',
                        company: r.company,
                        phone: r.phone,
                        email: r.email || '-',
                        attendance: r.attendance,
                        foodMenu: r.foodMenu || '-',
                        date: r.createdAt?.toDate().toLocaleString('th-TH') || '-'
                    });

                    // ตกแต่งแต่ละเซลล์ในแถว
                    row.eachCell((cell, colNumber) => {
                        cell.font = { name: 'Sarabun', size: 10, color: { argb: 'FF1E293B' } }; // ลดฟอนต์ข้อมูลทั่วไปเป็น 10
                        cell.border = { top: {style:'thin', color:{argb:'FFE2E8F0'}}, left: {style:'thin', color:{argb:'FFE2E8F0'}}, bottom: {style:'thin', color:{argb:'FFE2E8F0'}}, right: {style:'thin', color:{argb:'FFE2E8F0'}} };
                        
                        // จัดกึ่งกลางให้คอลัมน์ ลำดับ, ชื่อเล่น, โทร, สถานะ, วันที่
                        if ([1, 3, 5, 7, 9].includes(colNumber)) {
                            cell.alignment = { vertical: 'middle', horizontal: 'center', wrapText: true };
                        } else {
                            cell.alignment = { vertical: 'middle', horizontal: 'left', indent: 1, wrapText: true };
                        }
                        
                        // สลับสีแถว (Zebra striping)
                        if (idx % 2 === 1) {
                            cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF8FAFC' } };
                        }
                        
                        // ไฮไลต์สีให้สถานะ "เข้าร่วม" ดูเด่นขึ้น
                        if (colNumber === 7) {
                            if (r.attendance === 'เข้าร่วม') {
                                cell.font = { name: 'Sarabun', size: 10, bold: true, color: { argb: 'FF15803D' } }; // ฟอนต์สถานะไซส์ 10 สีเขียวเข้ม
                            } else {
                                cell.font = { name: 'Sarabun', size: 10, bold: true, color: { argb: 'FF94A3B8' } }; // ฟอนต์สถานะไซส์ 10 สีเทา
                            }
                        }
                    });
                    row.height = 22; // ลดความสูงบรรทัดข้อมูลลงนิดนึงให้อ่านพอดี
                });

                // 6. สร้างไฟล์และดาวน์โหลด
                const buffer = await workbook.xlsx.writeBuffer();
                const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                saveAs(blob, `รายงานลงทะเบียน_รถยนต์2พลัส_${new Date().toISOString().slice(0, 10)}.xlsx`);
            };

            // --- ส่วนที่ 1: หน้าแรก (Landing) ---
            if (view === 'landing') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-slate-100">
                        <div className="max-w-md w-full bg-white rounded-[32px] shadow-2xl overflow-hidden relative">
                            <div className="h-56 w-full relative bg-slate-800">
                                <img src="./cover.png" alt="Cover" className="w-full h-full object-cover" onError={(e) => {e.target.src="https://images.unsplash.com/photo-1502877338535-766e1452684a?q=80&w=800"}} />
                                <div className="absolute inset-0 bg-gradient-to-t from-slate-900/40 to-transparent"></div>
                            </div>
                            <div className="p-6 md:p-8 relative z-10 -mt-6 bg-white rounded-t-[32px]">
                                <h1 className="text-2xl md:text-3xl font-black text-slate-800 leading-tight mb-2">ประกันรถยนต์ 2+ คุ้มค่า จัดเต็ม</h1>
                                <p className="text-red-600 font-bold text-lg mb-6">เน้นความคุ้มครองน้ำท่วม ในราคาสุดคุ้ม</p>
                                
                                <div className="space-y-5 mb-8">
                                    <div className="flex items-start gap-4">
                                        <div className="text-xl shrink-0 mt-0.5">🗓️</div>
                                        <div className="text-[15px] flex w-full leading-relaxed">
                                            <div className="font-bold text-slate-800 w-[90px] shrink-0">วันที่:</div>
                                            <div className="font-medium text-slate-600">13 พฤษภาคม 2569</div>
                                        </div>
                                    </div>
                                    <div className="flex items-start gap-4">
                                        <div className="text-xl shrink-0 mt-0.5">⏰</div>
                                        <div className="text-[15px] flex w-full leading-relaxed">
                                            <div className="font-bold text-slate-800 w-[90px] shrink-0">เวลา:</div>
                                            <div className="flex flex-col">
                                                <span className="font-medium text-slate-600">ลงทะเบียน 10.00 น.</span>
                                                <span className="font-bold text-red-600 mt-0.5">เริ่มประชุม 10.30 น.</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex items-start gap-4">
                                        <div className="text-xl shrink-0 mt-0.5">📍</div>
                                        <div className="text-[15px] flex w-full leading-relaxed">
                                            <div className="font-bold text-slate-800 w-[90px] shrink-0">สถานที่:</div>
                                            <div className="font-medium text-slate-600">ร้าน ณ คุณ</div>
                                        </div>
                                    </div>
                                    <div className="flex items-start gap-4">
                                        <div className="text-xl shrink-0 mt-0.5">🎤</div>
                                        <div className="text-[15px] flex w-full leading-relaxed">
                                            <div className="font-bold text-slate-800 w-[90px] shrink-0">วิทยากร:</div>
                                            <div className="flex flex-col text-slate-800">
                                                <span className="font-bold">คุณณัฐพัตร์ เพ็ชรสุวรรณ (คุณวี)</span>
                                                <span className="text-[13px] font-bold text-slate-500 mt-1 leading-snug">
                                                    Hatyai Independent Distribution Partners Manager <br/> 
                                                    บริษัท CHUBB
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex items-start gap-4 pt-2">
                                        <div className="text-xl shrink-0 mt-0.5">💡</div>
                                        <div className="text-[15px] flex w-full">
                                            <div className="font-bold text-slate-800 w-[90px] shrink-0">รายละเอียด:</div>
                                            <div className="font-medium text-slate-600 leading-relaxed text-justify pr-2">
                                                เจาะลึกแผนประกันรถยนต์ 2+ ที่ตอบโจทย์ความเสี่ยงในปัจจุบัน โดยเฉพาะ <span className="text-blue-600 font-bold italic">ความคุ้มครองน้ำท่วม</span> ที่กำลังเป็นปัญหาหลัก พร้อมเทคนิคการเลือกซื้อในราคาสุดคุ้ม
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <button onClick={() => setView('form')} className="w-full py-4 bg-[#dc2626] text-white rounded-2xl font-bold text-lg shadow-[0_8px_20px_-6px_rgba(220,38,38,0.5)] hover:bg-red-700 hover:-translate-y-1 transition-all">ลงทะเบียนเข้าร่วมอบรม 👉</button>
                            </div>
                            <div className="py-4 text-center border-t border-slate-100 bg-slate-50">
                                <button onClick={() => setView('login')} className="text-[10px] font-bold tracking-widest text-slate-300 hover:text-slate-500 uppercase transition-colors">Secure Admin Access</button>
                            </div>
                        </div>
                    </div>
                );
            }

            // --- ส่วนที่ 2: หน้าฟอร์ม ---
            if (view === 'form') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 py-10 bg-slate-100">
                        <div className="max-w-md w-full bg-white rounded-[32px] shadow-2xl overflow-hidden p-6 md:p-8 animate-in slide-in-from-right-4 duration-300">
                            <button onClick={() => setView('landing')} className="text-sm font-bold text-slate-400 hover:text-slate-600 mb-6 flex items-center gap-1 transition-colors">← ย้อนกลับ</button>
                            <div className="text-center mb-8">
                                <h2 className="text-2xl font-black text-slate-800 mb-2">ลงทะเบียนอบรม</h2>
                                <p className="text-red-600 font-bold text-[15px]">"ประกันรถยนต์ 2+ คุ้มค่า จัดเต็ม"</p>
                                <p className="text-xs text-slate-400 mt-4 font-bold tracking-wide">จัดทำโดย บริษัท พีพีพี อินชัวรันส์ โบรคเกอร์ จำกัด</p>
                            </div>
                            {errorMsg && <div className="mb-6 p-4 bg-red-50 text-red-600 rounded-xl text-sm font-bold border border-red-100 shadow-sm">{errorMsg}</div>}
                            <form onSubmit={handleSubmit} className="space-y-4">
                                <input type="text" required placeholder="ชื่อ - นามสกุล *" className="w-full px-5 py-3.5 rounded-xl border border-slate-200 bg-slate-50 outline-none focus:bg-white focus:ring-2 focus:ring-red-500 transition-all font-medium text-slate-700" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                                <input type="text" placeholder="ชื่อเล่น (ถ้ามี)" className="w-full px-5 py-3.5 rounded-xl border border-slate-200 bg-slate-50 outline-none focus:bg-white focus:ring-2 focus:ring-red-500 transition-all font-medium text-slate-700" value={formData.nickname} onChange={e => setFormData({...formData, nickname: e.target.value})} />
                                <input type="text" required placeholder="บริษัท / หน่วยงาน *" className="w-full px-5 py-3.5 rounded-xl border border-slate-200 bg-slate-50 outline-none focus:bg-white focus:ring-2 focus:ring-red-500 transition-all font-medium text-slate-700" value={formData.company} onChange={e => setFormData({...formData, company: e.target.value})} />
                                <input type="email" placeholder="อีเมล (ถ้ามี)" className="w-full px-5 py-3.5 rounded-xl border border-slate-200 bg-slate-50 outline-none focus:bg-white focus:ring-2 focus:ring-red-500 transition-all font-medium text-slate-700" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} />
                                <input type="tel" required placeholder="เบอร์โทรศัพท์ *" className="w-full px-5 py-3.5 rounded-xl border border-slate-200 bg-slate-50 outline-none focus:bg-white focus:ring-2 focus:ring-red-500 transition-all font-medium text-slate-700" value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} />
                                
                                <div className="bg-slate-50 p-1.5 rounded-2xl flex border border-slate-200 mt-4">
                                    <button type="button" onClick={() => setFormData({...formData, attendance: 'เข้าร่วม'})} className={`flex-1 py-3 rounded-xl font-bold text-sm transition-all ${formData.attendance === 'เข้าร่วม' ? 'bg-white text-red-600 shadow-sm border border-slate-200' : 'text-slate-500 hover:text-slate-700'}`}>เข้าร่วม</button>
                                    <button type="button" onClick={() => setFormData({...formData, attendance: 'ไม่เข้าร่วม', foodMenu: '', acceptedTerms: false})} className={`flex-1 py-3 rounded-xl font-bold text-sm transition-all ${formData.attendance === 'ไม่เข้าร่วม' ? 'bg-white text-slate-700 shadow-sm border border-slate-200' : 'text-slate-500 hover:text-slate-700'}`}>ไม่เข้าร่วม</button>
                                </div>

                                {formData.attendance === 'เข้าร่วม' && (
                                    <div className="space-y-4 animate-in fade-in pt-4 border-t border-slate-100 mt-4">
                                        <div>
                                            <label className="block text-sm font-bold text-slate-700 mb-2">🍽️ ระบุเมนู ขนม และ เครื่องดื่ม ที่ต้องการ *</label>
                                            <input type="text" required placeholder="เช่น ชาไทยเย็น, กาแฟ + แซนด์วิช" className="w-full px-5 py-3.5 rounded-xl border border-slate-200 bg-slate-50 outline-none focus:bg-white focus:ring-2 focus:ring-red-500 transition-all font-medium text-slate-700" value={formData.foodMenu} onChange={e => setFormData({...formData, foodMenu: e.target.value})} />
                                        </div>
                                        <div className="bg-red-50 p-5 rounded-2xl border border-red-100 relative overflow-hidden">
                                            <div className="absolute top-0 right-0 w-16 h-16 bg-red-100 rounded-bl-full -mr-4 -mt-4 z-0"></div>
                                            <p className="text-sm text-slate-700 mb-4 relative z-10"><strong className="text-red-600">📌 หมายเหตุ:</strong> หากลงทะเบียนยืนยันแล้วไม่มา ขอสงวนสิทธิ์เก็บเงิน 300 บาท</p>
                                            <label className="flex items-center gap-3 cursor-pointer group relative z-10">
                                                <input type="checkbox" className="w-5 h-5 rounded border-2 border-slate-300 accent-red-600 cursor-pointer" checked={formData.acceptedTerms} onChange={e => setFormData({...formData, acceptedTerms: e.target.checked})} />
                                                <span className="text-sm font-bold text-slate-800 group-hover:text-red-600 transition-colors">รับทราบและยอมรับเงื่อนไข</span>
                                            </label>
                                        </div>
                                    </div>
                                )}
                                <button type="submit" disabled={loading} className="w-full py-4 bg-[#dc2626] text-white rounded-2xl font-bold text-lg mt-6 shadow-[0_8px_20px_-6px_rgba(220,38,38,0.5)] hover:bg-red-700 hover:-translate-y-1 transition-all disabled:opacity-70 disabled:cursor-not-allowed">
                                    {loading ? "กำลังบันทึก..." : "ยืนยันการลงทะเบียน"}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            if (view === 'success') return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-slate-100">
                    <div className="max-w-md w-full bg-white p-10 rounded-[32px] shadow-2xl text-center border border-slate-100 animate-in zoom-in duration-300">
                        <div className="text-7xl mb-6 drop-shadow-sm">✅</div>
                        <h2 className="text-2xl font-black mb-2 text-slate-800">บันทึกข้อมูลเรียบร้อย</h2>
                        <p className="text-slate-500 font-medium mb-8">เราได้รับข้อมูลการลงทะเบียนของคุณแล้ว</p>
                        <button onClick={() => setView('landing')} className="w-full py-4 bg-slate-50 hover:bg-slate-100 border border-slate-200 text-slate-700 rounded-xl font-bold transition-all">กลับหน้าแรก</button>
                    </div>
                </div>
            );

            if (view === 'login') return (
                <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4">
                    <div className="w-full max-w-sm bg-white p-8 rounded-[32px] shadow-2xl">
                        <div className="w-16 h-16 bg-red-50 text-red-600 rounded-2xl flex items-center justify-center mx-auto mb-6 text-2xl">🔐</div>
                        <h2 className="text-2xl font-bold mb-6 text-center text-slate-800">Admin Login</h2>
                        {errorMsg && <div className="mb-4 p-3 bg-red-50 text-red-600 rounded-xl text-sm font-bold border border-red-100 text-center">{errorMsg}</div>}
                        <form onSubmit={handleAdminLogin} className="space-y-4 text-left">
                            <input type="text" placeholder="Username" className="w-full px-5 py-4 rounded-xl border border-slate-200 bg-slate-50 outline-none focus:ring-2 focus:ring-red-500 focus:bg-white transition-all font-medium" value={username} onChange={e => setUsername(e.target.value)} />
                            <input type="password" placeholder="Password" className="w-full px-5 py-4 rounded-xl border border-slate-200 bg-slate-50 outline-none focus:ring-2 focus:ring-red-500 focus:bg-white transition-all font-medium" value={password} onChange={e => setPassword(e.target.value)} />
                            <button type="submit" className="w-full py-4 bg-red-600 text-white rounded-xl font-bold shadow-lg hover:bg-red-700 transition-all mt-2">เข้าสู่ระบบ</button>
                            <button type="button" onClick={() => setView('landing')} className="w-full text-slate-400 hover:text-slate-600 text-sm mt-4 transition-colors font-semibold">← กลับหน้าหลัก</button>
                        </form>
                    </div>
                </div>
            );

            // --- ส่วนที่ 3: ระบบหลังบ้าน (Admin Dashboard) ---
            if (view === 'admin') {
                // คำนวณ KPI Dashboard
                const totalReg = registrations.length;
                const attending = registrations.filter(r => r.attendance === 'เข้าร่วม').length;
                const notAttending = totalReg - attending;

                return (
                    <div className="min-h-screen bg-slate-50 font-sans pb-12">
                        {/* Navbar */}
                        <nav className="bg-white border-b border-slate-200 px-4 md:px-8 py-4 sticky top-0 z-50 flex justify-between items-center shadow-sm">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-red-600 text-white rounded-xl flex items-center justify-center font-black text-xl shadow-md">P</div>
                                <div>
                                    <div className="font-black text-slate-800 leading-tight">PPP Admin</div>
                                    <div className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Management System</div>
                                </div>
                            </div>
                            <button onClick={() => firebase.auth().signOut()} className="text-sm font-bold text-slate-500 hover:text-red-600 transition-colors bg-slate-50 hover:bg-red-50 px-4 py-2 rounded-lg border border-slate-200 hover:border-red-200">
                                ออกจากระบบ
                            </button>
                        </nav>

                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                            
                            {/* Dashboard Header & Action */}
                            <div className="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-8">
                                <div>
                                    <h1 className="text-2xl md:text-3xl font-black text-slate-800 tracking-tight">Executive Dashboard</h1>
                                    <p className="text-sm text-slate-500 mt-1 font-medium">ภาพรวมข้อมูลผู้ลงทะเบียนสัมมนา "ประกันรถยนต์ 2+"</p>
                                </div>
                                <button onClick={exportExcel} className="flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-xl font-bold shadow-lg shadow-emerald-600/20 transition-all hover:-translate-y-1 w-full md:w-auto">
                                    <span className="text-lg">📥</span> โหลด Excel
                                </button>
                            </div>

                            {/* KPI Cards */}
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6 mb-8">
                                <div className="bg-white rounded-2xl p-6 border border-slate-100 shadow-sm flex items-center justify-between border-l-4 border-l-blue-500 hover:shadow-md transition-shadow">
                                    <div>
                                        <p className="text-xs font-extrabold text-slate-400 uppercase tracking-widest mb-1">ลงทะเบียนทั้งหมด</p>
                                        <div className="flex items-baseline gap-1"><span className="text-4xl font-black text-slate-800">{totalReg}</span><span className="text-sm font-bold text-slate-400">ท่าน</span></div>
                                    </div>
                                    <div className="w-12 h-12 rounded-full bg-blue-50 flex items-center justify-center text-2xl">👥</div>
                                </div>
                                <div className="bg-white rounded-2xl p-6 border border-slate-100 shadow-sm flex items-center justify-between border-l-4 border-l-emerald-500 hover:shadow-md transition-shadow">
                                    <div>
                                        <p className="text-xs font-extrabold text-emerald-500 uppercase tracking-widest mb-1">ยืนยันเข้าร่วม</p>
                                        <div className="flex items-baseline gap-1"><span className="text-4xl font-black text-emerald-600">{attending}</span><span className="text-sm font-bold text-emerald-400">ท่าน</span></div>
                                    </div>
                                    <div className="w-12 h-12 rounded-full bg-emerald-50 flex items-center justify-center text-2xl">✅</div>
                                </div>
                                <div className="bg-white rounded-2xl p-6 border border-slate-100 shadow-sm flex items-center justify-between border-l-4 border-l-slate-400 hover:shadow-md transition-shadow">
                                    <div>
                                        <p className="text-xs font-extrabold text-slate-400 uppercase tracking-widest mb-1">ไม่เข้าร่วม</p>
                                        <div className="flex items-baseline gap-1"><span className="text-4xl font-black text-slate-600">{notAttending}</span><span className="text-sm font-bold text-slate-400">ท่าน</span></div>
                                    </div>
                                    <div className="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center text-2xl">❌</div>
                                </div>
                            </div>

                            {/* Data Table */}
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                <div className="p-5 border-b border-slate-100 bg-slate-50 flex items-center gap-2">
                                    <span className="text-lg">📋</span>
                                    <h3 className="font-bold text-slate-700">รายชื่อผู้ลงทะเบียนรายละเอียด</h3>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left whitespace-nowrap">
                                        <thead className="bg-white border-b border-slate-200">
                                            <tr>
                                                <th className="px-6 py-4 text-[11px] font-extrabold text-slate-400 uppercase tracking-wider">ชื่อ-นามสกุล / บริษัท</th>
                                                <th className="px-6 py-4 text-[11px] font-extrabold text-slate-400 uppercase tracking-wider">ข้อมูลการติดต่อ</th>
                                                <th className="px-6 py-4 text-[11px] font-extrabold text-slate-400 uppercase tracking-wider text-center">สถานะ</th>
                                                <th className="px-6 py-4 text-[11px] font-extrabold text-slate-400 uppercase tracking-wider">เมนูอาหาร/เครื่องดื่ม</th>
                                                <th className="px-6 py-4 text-[11px] font-extrabold text-slate-400 uppercase tracking-wider text-right">จัดการ</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {registrations.map(r => (
                                                <tr key={r.id} className="hover:bg-slate-50 transition-colors group">
                                                    <td className="px-6 py-4">
                                                        <div className="font-bold text-slate-800 text-sm">{r.name} <span className="text-slate-400 font-medium text-xs ml-1">{r.nickname ? `(${r.nickname})` : ''}</span></div>
                                                        <div className="text-xs text-slate-500 font-medium flex items-center gap-1 mt-1"><span className="text-[10px]">🏢</span> {r.company}</div>
                                                    </td>
                                                    <td className="px-6 py-4">
                                                        <div className="font-bold text-slate-700 text-sm flex items-center gap-1">📞 {r.phone}</div>
                                                        {r.email && <div className="text-xs text-slate-500 mt-1 flex items-center gap-1">✉️ {r.email}</div>}
                                                    </td>
                                                    <td className="px-6 py-4 text-center">
                                                        <span className={`inline-flex items-center gap-1 px-3 py-1 rounded-full text-[11px] font-bold ${r.attendance === 'เข้าร่วม' ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-500'}`}>
                                                            {r.attendance === 'เข้าร่วม' ? '✅ เข้าร่วม' : '❌ ไม่ร่วม'}
                                                        </span>
                                                    </td>
                                                    <td className="px-6 py-4">
                                                        {r.attendance === 'เข้าร่วม' ? (
                                                            <div className="text-sm font-bold text-indigo-700 bg-indigo-50 px-3 py-1.5 rounded-lg border border-indigo-100 inline-block max-w-[200px] truncate" title={r.foodMenu}>
                                                                🍽️ {r.foodMenu || '-'}
                                                            </div>
                                                        ) : (
                                                            <span className="text-slate-300 font-bold">-</span>
                                                        )}
                                                    </td>
                                                    <td className="px-6 py-4 text-right">
                                                        <button 
                                                            onClick={() => handleDelete(r.id)} 
                                                            className="inline-flex items-center justify-center gap-1 px-3 py-1.5 rounded-lg text-xs font-bold text-slate-400 hover:text-red-600 hover:bg-red-50 transition-all border border-transparent hover:border-red-100"
                                                        >
                                                            🗑️ ลบ
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                            {registrations.length === 0 && (
                                                <tr>
                                                    <td colSpan="5" className="px-6 py-16 text-center text-slate-400 font-bold bg-slate-50/50">
                                                        <div className="text-4xl mb-2">📭</div>
                                                        ยังไม่มีข้อมูลผู้ลงทะเบียน
                                                    </td>
                                                </tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                        </div>
                    </div>
                );
            }
            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
