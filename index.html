<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนอบรมประกันอัคคีภัย</title>
    <!-- CSS & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDK (Version Compat - เสถียรที่สุดสำหรับไฟล์เดียว) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- SheetJS สำหรับสร้างไฟล์ Excel แบบสมบูรณ์ -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

    <script type="text/babel">
        // --- ส่วนที่ 1: รหัสเชื่อมต่อ FIREBASE ของคุณอภิชิต ---
        const firebaseConfig = {
            apiKey: "AIzaSyC9-6NepYeoyU4-pluImdIcNBV6H7ThLas",
            authDomain: "ppp-registration.firebaseapp.com",
            projectId: "ppp-registration",
            storageBucket: "ppp-registration.firebasestorage.app",
            messagingSenderId: "1072711188640",
            appId: "1:1072711188640:web:e639ef36b32ea637ab09c5",
            measurementId: "G-Z0XFPK8CJ7"
        };

        const App = () => {
            const [view, setView] = React.useState('form');
            const [isAdminURL, setIsAdminURL] = React.useState(false);
            const [isUnlocked, setIsUnlocked] = React.useState(false);
            const [submitted, setSubmitted] = React.useState(false);
            const [loading, setLoading] = React.useState(false);
            const [records, setRecords] = React.useState([]);
            const [formData, setFormData] = React.useState({ 
                name: '', company: '', phone: '', attendance: 'เข้าร่วม' 
            });

            const appId = "ppp-registration";

            React.useEffect(() => {
                // ตรวจสอบ URL ว่ามี ?mode=admin หรือไม่
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.get('mode') === 'admin') {
                    setIsAdminURL(true);
                }

                // เริ่มต้น Firebase และดึงข้อมูล
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                const db = firebase.firestore();
                const auth = firebase.auth();

                auth.signInAnonymously().then(() => {
                    const q = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('registrations');
                    q.onSnapshot((snapshot) => {
                        const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        // เรียงข้อมูลล่าสุดไว้บนสุด
                        items.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                        setRecords(items);
                    });
                }).catch(err => console.error("Auth Error:", err));
            }, []);

            // ฟังก์ชันตรวจสอบรหัสผ่านหน้าแอดมิน
            const handleAdminLogin = () => {
                const pass = prompt("กรุณาใส่รหัสผ่านแอดมิน (6 หลัก):");
                if (pass === "123456") { 
                    setIsUnlocked(true); 
                    setView('admin'); 
                } else if (pass !== null) {
                    alert("รหัสผ่านไม่ถูกต้อง!");
                }
            };

            // ฟังก์ชันบันทึกข้อมูลการลงทะเบียน
            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const db = firebase.firestore();
                    const q = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('registrations');
                    await q.add({
                        ...formData,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setSubmitted(true);
                    setFormData({ name: '', company: '', phone: '', attendance: 'เข้าร่วม' });
                } catch (err) { 
                    alert("ส่งข้อมูลไม่สำเร็จ: " + err.message); 
                }
                setLoading(false);
            };

            // ฟังก์ชันโหลดไฟล์ Excel (ปรับความกว้างคอลัมน์อัตโนมัติ)
            const exportToExcel = () => {
                if (records.length === 0) {
                    alert("ยังไม่มีข้อมูลผู้ลงทะเบียน");
                    return;
                }

                // 1. จัดเตรียมข้อมูล
                const dataForExcel = records.map((r, index) => ({
                    "ลำดับ": index + 1,
                    "ชื่อ-นามสกุล": r.name,
                    "บริษัท / หน่วยงาน": r.company,
                    "เบอร์โทรศัพท์": r.phone,
                    "สถานะการเข้าร่วม": r.attendance,
                    "วันที่ลงทะเบียน": r.createdAt ? r.createdAt.toDate().toLocaleString('th-TH') : "ไม่ระบุ"
                }));

                // 2. สร้าง Sheet
                const ws = XLSX.utils.json_to_sheet(dataForExcel);

                // 3. กำหนดความกว้างคอลัมน์ (ให้สวยงามพอดีคำ)
                const wscols = [
                    { wch: 8 },  // ลำดับ
                    { wch: 30 }, // ชื่อ-นามสกุล
                    { wch: 35 }, // บริษัท
                    { wch: 15 }, // เบอร์โทร
                    { wch: 18 }, // สถานะ
                    { wch: 22 }  // วันที่ลงทะเบียน
                ];
                ws['!cols'] = wscols;

                // 4. บันทึกเป็นไฟล์ .xlsx
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "รายชื่อผู้ลงทะเบียน");
                
                // ตั้งชื่อไฟล์ตามวันที่
                const dateStr = new Date().toLocaleDateString('th-TH').replace(/\//g, '-');
                const fileName = `รายงานลงทะเบียน_${dateStr}.xlsx`;
                
                XLSX.writeFile(wb, fileName);
            };

            // ---- หน้าจอสำหรับ Admin ----
            if (view === 'admin' && isUnlocked) {
                return (
                    <div className="p-4 md:p-8 max-w-5xl mx-auto">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
                            <h1 className="text-2xl font-bold text-slate-800 border-b-4 border-red-500 pb-1">
                                รายชื่อผู้ลงทะเบียน ({records.length})
                            </h1>
                            <div className="flex gap-2 w-full md:w-auto">
                                <button onClick={exportToExcel} className="flex-1 md:flex-none bg-green-600 text-white px-6 py-2.5 rounded-xl font-bold shadow-lg hover:bg-green-700 transition-all">
                                    📥 โหลดไฟล์ Excel
                                </button>
                                <button onClick={() => setView('form')} className="flex-1 md:flex-none bg-white border border-slate-200 text-slate-600 px-6 py-2.5 rounded-xl font-bold hover:bg-slate-50">
                                    กลับหน้าฟอร์ม
                                </button>
                            </div>
                        </div>

                        <div className="bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden">
                            <div className="overflow-x-auto">
                                <table className="w-full text-left">
                                    <thead className="bg-slate-50 border-b border-slate-100 font-bold text-slate-500 uppercase text-xs">
                                        <tr>
                                            <th className="px-6 py-4">ลูกค้า / บริษัท</th>
                                            <th className="px-6 py-4">เบอร์โทร</th>
                                            <th className="px-6 py-4 text-right">สถานะ</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-50">
                                        {records.map(item => (
                                            <tr key={item.id} className="hover:bg-slate-50 transition-colors">
                                                <td className="px-6 py-4">
                                                    <div className="font-bold text-slate-800 text-sm">{item.name}</div>
                                                    <div className="text-xs text-slate-500 mt-1">{item.company}</div>
                                                </td>
                                                <td className="px-6 py-4 text-slate-700 text-sm font-mono">{item.phone}</td>
                                                <td className="px-6 py-4 text-right">
                                                    <span className={`px-3 py-1 rounded-full text-[10px] font-bold ${item.attendance === 'เข้าร่วม' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                                        {item.attendance}
                                                    </span>
                                                    <div className="text-[10px] text-slate-400 mt-2">
                                                        {item.createdAt ? item.createdAt.toDate().toLocaleDateString('th-TH') : ''}
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                        {records.length === 0 && (
                                            <tr>
                                                <td colSpan="3" className="px-6 py-10 text-center text-slate-400">
                                                    ยังไม่มีข้อมูลผู้ลงทะเบียน
                                                </td>
                                            </tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            }

            // ---- หน้าจอแบบฟอร์มลงทะเบียน (ลูกค้าเห็นหน้านี้) ----
            return (
                <div className="flex items-center justify-center p-4 pt-10 md:pt-20">
                    <div className="w-full max-w-md">
                        {submitted ? (
                            <div className="bg-white p-10 rounded-3xl shadow-2xl text-center border border-slate-100">
                                <div className="text-6xl mb-6">🎉</div>
                                <h2 className="text-2xl font-bold mb-2 text-slate-800">ลงทะเบียนสำเร็จ</h2>
                                <p className="text-slate-500 mb-8">ขอบคุณที่สนใจเข้าร่วมอบรมครับ</p>
                                <button onClick={() => setSubmitted(false)} className="w-full py-4 bg-red-600 text-white rounded-2xl font-bold shadow-lg hover:bg-red-700 transition-all active:scale-95">
                                    ลงทะเบียนท่านอื่นเพิ่ม
                                </button>
                            </div>
                        ) : (
                            <div className="bg-white p-8 rounded-3xl shadow-2xl border border-slate-100 overflow-hidden relative">
                                <div className="mb-8 text-center">
                                    <h1 className="text-2xl font-bold text-slate-800 mb-2">ลงทะเบียนอบรม</h1>
                                    <div className="h-1 w-16 bg-red-500 mx-auto rounded-full mb-4"></div>
                                    <p className="text-sm text-red-600 font-bold leading-relaxed">
                                        เข้าร่วมอบรมให้ความรู้ประกันอัคคีภัยบ้านอยู่อาศัย
                                    </p>
                                </div>
                                <form onSubmit={handleSubmit} className="space-y-4">
                                    <div className="space-y-1">
                                        <label className="text-xs font-bold text-slate-500 ml-1">ชื่อ - นามสกุล</label>
                                        <input type="text" required placeholder="ชื่อจริง-นามสกุล" className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-red-500 outline-none transition-all" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-xs font-bold text-slate-500 ml-1">บริษัท / หน่วยงาน</label>
                                        <input type="text" required placeholder="ชื่อบริษัท" className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-red-500 outline-none transition-all" value={formData.company} onChange={e => setFormData({...formData, company: e.target.value})} />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-xs font-bold text-slate-500 ml-1">เบอร์โทรศัพท์</label>
                                        <input type="tel" required placeholder="08X-XXX-XXXX" className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-red-500 outline-none transition-all" value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} />
                                    </div>
                                    
                                    <div className="space-y-2 pt-2">
                                        <label className="text-xs font-bold text-slate-500 ml-1">ความประสงค์</label>
                                        <div className="grid grid-cols-2 gap-3">
                                            <button type="button" onClick={() => setFormData({...formData, attendance: 'เข้าร่วม'})} className={`py-3 rounded-xl font-bold border-2 transition-all ${formData.attendance === 'เข้าร่วม' ? 'bg-red-600 border-red-600 text-white shadow-md' : 'bg-white border-slate-100 text-slate-400'}`}>
                                                เข้าร่วม
                                            </button>
                                            <button type="button" onClick={() => setFormData({...formData, attendance: 'ไม่เข้าร่วม'})} className={`py-3 rounded-xl font-bold border-2 transition-all ${formData.attendance === 'ไม่เข้าร่วม' ? 'bg-slate-800 border-slate-800 text-white shadow-md' : 'bg-white border-slate-100 text-slate-400'}`}>
                                                ไม่เข้าร่วม
                                            </button>
                                        </div>
                                    </div>

                                    <button type="submit" disabled={loading} className="w-full py-4 bg-red-600 text-white rounded-2xl font-bold shadow-xl hover:bg-red-700 transition-all mt-4 flex justify-center items-center">
                                        {loading ? <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : "ยืนยันลงทะเบียน"}
                                    </button>
                                </form>

                                {/* ส่วนนี้ซ่อนจากลูกค้าทั่วไป จะเห็นเฉพาะตอนเข้าลิงก์ ?mode=admin */}
                                {isAdminURL && !isUnlocked && (
                                    <button onClick={handleAdminLogin} className="w-full mt-10 text-slate-200 text-[10px] uppercase tracking-widest hover:text-slate-400 transition-colors italic">
                                        Admin Verification Required
                                    </button>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
