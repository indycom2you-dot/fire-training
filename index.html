<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนอบรมประกันอัคคีภัย</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // --- Firebase Setup (Dynamic from Environment) ---
        // เราจะใช้ข้อมูลจากตัวแปรที่เราตั้งใน Vercel
        const firebaseConfig = {
            apiKey: "", // Vercel จะจัดการให้ผ่าน Environment Variables หรือคุณสามารถวางรหัสตรงนี้ได้เลย
            authDomain: "",
            projectId: "",
            storageBucket: "",
            messagingSenderId: "",
            appId: ""
        };

        // สำหรับการใช้งานผ่าน CDN เราต้องนำเข้า Firebase แบบนี้
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, updateDoc, deleteDoc, Timestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // โค้ดส่วนประกอบ (Components) และ Logic ทั้งหมด
        function App() {
            const [view, setView] = useState('form');
            const [user, setUser] = useState(null);
            const [registrations, setRegistrations] = useState([]);
            const [loading, setLoading] = useState(false);
            const [submitted, setSubmitted] = useState(false);
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [db, setDb] = useState(null);
            const [auth, setAuth] = useState(null);

            const [formData, setFormData] = useState({
                name: '', company: '', phone: '', attendance: 'เข้าร่วม'
            });

            const [editingId, setEditingId] = useState(null);
            const [editFormData, setEditFormData] = useState({ name: '', company: '', phone: '', attendance: 'เข้าร่วม' });

            // Initialize Firebase on load
            useEffect(() => {
                // พยายามดึง Config จากตัวแปรระบบ (ถ้ามี)
                let config = firebaseConfig;
                try {
                    // สำหรับระบบที่เตรียมไว้ใน Vercel/Canvas
                    if (window.__firebase_config) {
                        config = JSON.parse(window.__firebase_config);
                    }
                } catch(e) {}

                const app = initializeApp(config);
                const firestore = getFirestore(app);
                const firebaseAuth = getAuth(app);
                setDb(firestore);
                setAuth(firebaseAuth);

                const initAuth = async () => {
                    await signInAnonymously(firebaseAuth);
                };
                initAuth();

                const unsubscribe = onAuthStateChanged(firebaseAuth, setUser);
                return () => unsubscribe();
            }, []);

            // ดึงข้อมูลเมื่อเป็นหน้า Admin
            useEffect(() => {
                if (!user || view !== 'admin' || !db) return;
                const appId = window.__app_id || 'fire-training-app';
                const q = collection(db, 'artifacts', appId, 'public', 'data', 'registrations');
                
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const docs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    const sorted = docs.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                    setRegistrations(sorted);
                });
                return () => unsubscribe();
            }, [user, view, db]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!db || !user) return;
                setLoading(true);
                try {
                    const appId = window.__app_id || 'fire-training-app';
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'registrations'), {
                        ...formData,
                        createdAt: Timestamp.now(),
                        submittedBy: user.uid
                    });
                    setSubmitted(true);
                    setFormData({ name: '', company: '', phone: '', attendance: 'เข้าร่วม' });
                } catch (err) {
                    console.error(err);
                    alert("เกิดข้อผิดพลาด กรุณาลองใหม่");
                } finally {
                    setLoading(false);
                }
            };

            const handleUpdate = async (id) => {
                const appId = window.__app_id || 'fire-training-app';
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'registrations', id);
                await updateDoc(docRef, editFormData);
                setEditingId(null);
            };

            const handleDelete = async (id) => {
                if (!confirm("ลบข้อมูลนี้ใช่หรือไม่?")) return;
                const appId = window.__app_id || 'fire-training-app';
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'registrations', id));
            };

            const exportToCSV = () => {
                const headers = ["ชื่อ", "บริษัท", "เบอร์โทร", "สถานะ", "วันที่"];
                const rows = registrations.map(r => [
                    `"${r.name}"`, `"${r.company}"`, `"${r.phone}"`, `"${r.attendance}"`, 
                    `"${r.createdAt?.toDate().toLocaleString('th-TH')}"`
                ]);
                const csvContent = "\uFEFF" + [headers, ...rows].map(e => e.join(",")).join("\n");
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `registrations.csv`;
                link.click();
            };

            return (
                <div className="min-h-screen">
                    <nav className="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center shadow-sm">
                        <div className="flex items-center gap-2 font-bold text-red-600">
                            <span className="text-xl">Fire Training Form</span>
                        </div>
                        <button 
                            onClick={() => setView(view === 'form' ? 'admin' : 'form')}
                            className="px-4 py-2 rounded-full text-sm font-semibold bg-slate-100 text-slate-600 hover:bg-slate-200 transition-all"
                        >
                            {view === 'form' ? 'ระบบหลังบ้าน' : 'หน้าลงทะเบียน'}
                        </button>
                    </nav>

                    <div className="max-w-4xl mx-auto px-4 mt-8 pb-20">
                        {view === 'form' ? (
                            <div className="max-w-md mx-auto">
                                {submitted ? (
                                    <div className="bg-white p-10 rounded-3xl shadow-xl text-center border border-slate-100">
                                        <div className="text-5xl mb-4">✅</div>
                                        <h2 className="text-2xl font-bold mb-2">ลงทะเบียนสำเร็จ</h2>
                                        <p className="text-slate-500 mb-8">เราได้รับข้อมูลของคุณแล้วครับ</p>
                                        <button onClick={() => setSubmitted(false)} className="w-full py-3 bg-red-600 text-white rounded-xl font-bold">ลงทะเบียนเพิ่ม</button>
                                    </div>
                                ) : (
                                    <div className="bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
                                        <h1 className="text-xl font-bold mb-6 text-center">ลงทะเบียนอบรมประกันอัคคีภัย</h1>
                                        <form onSubmit={handleSubmit} className="space-y-4">
                                            <div>
                                                <label className="block text-sm font-bold mb-1 text-slate-700">ชื่อ - นามสกุล</label>
                                                <input type="text" required className="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:border-red-500" value={formData.name} onChange={(e) => setFormData({...formData, name: e.target.value})} />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-bold mb-1 text-slate-700">บริษัท / หน่วยงาน</label>
                                                <input type="text" required className="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:border-red-500" value={formData.company} onChange={(e) => setFormData({...formData, company: e.target.value})} />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-bold mb-1 text-slate-700">เบอร์โทรศัพท์</label>
                                                <input type="tel" required className="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:border-red-500" value={formData.phone} onChange={(e) => setFormData({...formData, phone: e.target.value})} />
                                            </div>
                                            <div className="grid grid-cols-2 gap-3 pt-2">
                                                <button type="button" onClick={() => setFormData({...formData, attendance: 'เข้าร่วม'})} className={`py-3 rounded-xl font-bold border-2 transition-all ${formData.attendance === 'เข้าร่วม' ? 'bg-red-50 border-red-500 text-red-600' : 'bg-white border-slate-100 text-slate-400'}`}>เข้าร่วม</button>
                                                <button type="button" onClick={() => setFormData({...formData, attendance: 'ไม่เข้าร่วม'})} className={`py-3 rounded-xl font-bold border-2 transition-all ${formData.attendance === 'ไม่เข้าร่วม' ? 'bg-slate-100 border-slate-500 text-slate-600' : 'bg-white border-slate-100 text-slate-400'}`}>ไม่เข้าร่วม</button>
                                            </div>
                                            <button type="submit" disabled={loading} className="w-full py-4 bg-red-600 text-white rounded-xl font-bold mt-4 shadow-lg">
                                                {loading ? "กำลังส่ง..." : "ยืนยันลงทะเบียน"}
                                            </button>
                                        </form>
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div>
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-bold">ข้อมูลผู้ลงทะเบียน</h2>
                                    <button onClick={exportToCSV} className="bg-green-600 text-white px-6 py-2 rounded-xl font-bold">โหลด Excel</button>
                                </div>
                                <div className="bg-white rounded-2xl shadow-xl overflow-hidden">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 text-slate-500 text-xs font-bold uppercase">
                                            <tr>
                                                <th className="px-6 py-4">ผู้สมัคร / บริษัท</th>
                                                <th className="px-6 py-4">เบอร์โทร</th>
                                                <th className="px-6 py-4">สถานะ</th>
                                                <th className="px-6 py-4 text-right">จัดการ</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {registrations.map((r) => (
                                                <tr key={r.id}>
                                                    <td className="px-6 py-4">
                                                        {editingId === r.id ? (
                                                            <div className="space-y-1">
                                                                <input className="border rounded w-full px-2 py-1 text-sm" value={editFormData.name} onChange={(e) => setEditFormData({...editFormData, name: e.target.value})} />
                                                                <input className="border rounded w-full px-2 py-1 text-sm" value={editFormData.company} onChange={(e) => setEditFormData({...editFormData, company: e.target.value})} />
                                                            </div>
                                                        ) : (
                                                            <div><div className="font-bold">{r.name}</div><div className="text-xs text-slate-400">{r.company}</div></div>
                                                        )}
                                                    </td>
                                                    <td className="px-6 py-4">
                                                        {editingId === r.id ? <input className="border rounded w-full px-2 py-1 text-sm" value={editFormData.phone} onChange={(e) => setEditFormData({...editFormData, phone: e.target.value})} /> : r.phone}
                                                    </td>
                                                    <td className="px-6 py-4">
                                                        <span className={`px-2 py-1 rounded-full text-[10px] font-bold ${r.attendance === 'เข้าร่วม' ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-500'}`}>{r.attendance}</span>
                                                    </td>
                                                    <td className="px-6 py-4 text-right">
                                                        {editingId === r.id ? (
                                                            <button onClick={() => handleUpdate(r.id)} className="text-green-600 font-bold">บันทึก</button>
                                                        ) : (
                                                            <div className="flex justify-end gap-2">
                                                                <button onClick={() => { setEditingId(r.id); setEditFormData(r); }} className="text-blue-500">แก้</button>
                                                                <button onClick={() => handleDelete(r.id)} className="text-red-300">ลบ</button>
                                                            </div>
                                                        )}
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
