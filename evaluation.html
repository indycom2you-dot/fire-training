<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบประเมินความพึงพอใจ - งานอบรมประกันอัคคีภัย</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@100;200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
        .admin-gradient { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .chart-container { position: relative; width: 100%; height: 250px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- ExcelJS & FileSaver -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <script type="text/babel">
        // รหัสเชื่อมต่อ FIREBASE ของคุณอภิชิต
        const firebaseConfig = {
            apiKey: "AIzaSyC9-6NepYeoyU4-pluImdIcNBV6H7ThLas",
            authDomain: "ppp-registration.firebaseapp.com",
            projectId: "ppp-registration",
            storageBucket: "ppp-registration.firebasestorage.app",
            messagingSenderId: "1072711188640",
            appId: "1:1072711188640:web:e639ef36b32ea637ab09c5",
            measurementId: "G-Z0XFPK8CJ7"
        };

        // Component สำหรับแถบให้คะแนน 1-5
        const RatingRow = ({ label, value, onChange }) => (
            <div className="mb-6 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                <label className="block text-[14px] font-bold text-slate-700 mb-3">{label}</label>
                <div className="flex justify-between max-w-[280px] mx-auto gap-2">
                    {[1, 2, 3, 4, 5].map(num => (
                        <button
                            type="button"
                            key={num}
                            onClick={() => onChange(num)}
                            className={`w-10 h-10 md:w-12 md:h-12 rounded-full font-black text-lg transition-all flex items-center justify-center ${
                                value === num 
                                ? 'bg-emerald-500 text-white scale-110 shadow-lg shadow-emerald-500/30' 
                                : 'bg-white text-slate-400 border-2 border-slate-200 hover:border-emerald-300 hover:text-emerald-500'
                            }`}
                        >
                            {num}
                        </button>
                    ))}
                </div>
                <div className="flex justify-between text-[11px] font-bold text-slate-400 mt-2 max-w-[280px] mx-auto px-1">
                    <span>1 = ปรับปรุง</span>
                    <span>5 = ดีเยี่ยม</span>
                </div>
            </div>
        );

        const App = () => {
            const [view, setView] = React.useState('form'); 
            const [user, setUser] = React.useState(null);
            const [evaluations, setEvaluations] = React.useState([]);
            const [loading, setLoading] = React.useState(false);
            const [submitted, setSubmitted] = React.useState(false);
            const [errorMsg, setErrorMsg] = React.useState(''); 
            const [searchTerm, setSearchTerm] = React.useState('');
            
            const [username, setUsername] = React.useState('');
            const [password, setPassword] = React.useState('');

            // ฟอร์มเก็บข้อมูลแบบประเมิน
            const [formData, setFormData] = React.useState({ 
                name: '', 
                scoreContent: 0,
                scoreSpeaker: 0,
                scoreVenue: 0,
                scoreOverall: 0,
                suggestion: '' 
            });

            const chartRef = React.useRef(null);
            const chartInstance = React.useRef(null);

            React.useEffect(() => {
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                const auth = firebase.auth();
                const db = firebase.firestore();

                // เรียกใช้ Anonymous Auth ล่วงหน้าก่อนเริ่มคิวรี่เพื่อป้องกัน Permission Error 
                const initAuth = async () => {
                    if (!auth.currentUser) {
                        try {
                            await auth.signInAnonymously();
                        } catch(e) {
                            console.error("Auth init error:", e);
                        }
                    }
                };
                initAuth();

                let unsubscribeData = null;

                const unsubscribeAuth = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    if (unsubscribeData) {
                        unsubscribeData();
                        unsubscribeData = null;
                    }
                    if (u && !u.isAnonymous) {
                        setView('admin');
                        
                        unsubscribeData = db.collection('evaluations')
                            .onSnapshot((snapshot) => {
                                const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                                items.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                                setEvaluations(items);
                            }, (error) => {
                                console.error("Firestore Error:", error);
                                if (error.message.includes('permission')) {
                                    setErrorMsg("ติดปัญหา Permission: กรุณาไปที่ Firebase Console -> Firestore -> Rules และตั้งค่าเป็น allow read, write: if true;");
                                }
                            });
                    } else {
                        setEvaluations([]);
                    }
                });

                return () => {
                    unsubscribeAuth();
                    if (unsubscribeData) unsubscribeData();
                };
            }, []);

            // วาดกราฟสรุปคะแนนเฉลี่ย
            React.useEffect(() => {
                if (view === 'admin' && chartRef.current && evaluations.length > 0) {
                    if (chartInstance.current) chartInstance.current.destroy();

                    // คำนวณค่าเฉลี่ย
                    const calcAvg = (key) => (evaluations.reduce((sum, ev) => sum + ev[key], 0) / evaluations.length).toFixed(2);
                    
                    const averages = [
                        calcAvg('scoreContent'),
                        calcAvg('scoreSpeaker'),
                        calcAvg('scoreVenue'),
                        calcAvg('scoreOverall')
                    ];

                    const ctx = chartRef.current.getContext('2d');
                    chartInstance.current = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: ['เนื้อหา', 'วิทยากร', 'สถานที่/อาหาร', 'ภาพรวม'],
                            datasets: [{
                                label: 'คะแนนเฉลี่ย (เต็ม 5)',
                                data: averages,
                                backgroundColor: ['#3b82f6', '#f59e0b', '#ec4899', '#10b981'],
                                borderRadius: 8,
                                barPercentage: 0.6
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            scales: {
                                y: { beginAtZero: true, max: 5, grid: { color: '#f1f5f9' } },
                                x: { grid: { display: false } }
                            },
                            plugins: {
                                legend: { display: false },
                                tooltip: { 
                                    callbacks: { label: (ctx) => ` คะแนนเฉลี่ย: ${ctx.raw} / 5` },
                                    bodyFont: { family: "'Sarabun', sans-serif" }
                                }
                            }
                        }
                    });
                }
                return () => { if (chartInstance.current) chartInstance.current.destroy(); };
            }, [view, evaluations]);

            const handleAdminLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setErrorMsg('');
                try {
                    const loginEmail = username.includes('@') ? username : `${username}@ppp.com`;
                    await firebase.auth().signInWithEmailAndPassword(loginEmail, password);
                } catch (err) {
                    setErrorMsg("ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้องครับ");
                }
                setLoading(false);
            };

            // 🟢 เพิ่มฟังก์ชัน handleSubmitEvaluation ที่หายไปกลับมาครับ
            const handleSubmitEvaluation = async (e) => {
                e.preventDefault();
                // เช็คว่าให้คะแนนครบทุกข้อไหม
                if (!formData.scoreContent || !formData.scoreSpeaker || !formData.scoreVenue || !formData.scoreOverall) {
                    setErrorMsg('กรุณาให้คะแนนให้ครบทุกหัวข้อครับ');
                    return;
                }

                setLoading(true);
                setErrorMsg('');
                try {
                    const auth = firebase.auth();
                    const db = firebase.firestore();
                    if (!auth.currentUser) await auth.signInAnonymously();
                    
                    await db.collection('evaluations').add({
                        ...formData,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    setSubmitted(true);
                    setFormData({ name: '', scoreContent: 0, scoreSpeaker: 0, scoreVenue: 0, scoreOverall: 0, suggestion: '' });
                } catch (err) {
                    // ดักจับ Error แจ้งเตือนผู้ใช้ให้ไปแก้ Rules ใน Firebase
                    if (err.message.includes('permission')) {
                        setErrorMsg("ไม่สามารถส่งข้อมูลได้: โปรดตั้งค่า Firebase Rules ให้ถูกต้อง");
                    } else {
                        setErrorMsg("เกิดข้อผิดพลาด: " + err.message);
                    }
                }
                setLoading(false);
            };

            const handleDelete = async (id) => {
                if (window.confirm("คุณอภิชิตต้องการลบข้อมูลแบบประเมินนี้ใช่หรือไม่?")) {
                    try {
                        await firebase.firestore().collection('evaluations').doc(id).delete();
                    } catch (err) { alert("ลบข้อมูลไม่สำเร็จ: " + err.message); }
                }
            };

            const exportExcel = async () => {
                const workbook = new ExcelJS.Workbook();
                const worksheet = workbook.addWorksheet('สรุปแบบประเมิน');

                worksheet.mergeCells('A1:G1');
                const titleCell = worksheet.getCell('A1');
                titleCell.value = 'รายงานผลแบบประเมินความพึงพอใจ: งานอบรมประกันอัคคีภัย';
                titleCell.font = { name: 'Sarabun', size: 14, bold: true, color: { argb: 'FFFFFFFF' } };
                titleCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF1E293B' } }; 
                titleCell.alignment = { vertical: 'middle', horizontal: 'center' };
                worksheet.getRow(1).height = 35;

                worksheet.addRow([]);

                const headers = ['ลำดับ', 'ผู้ประเมิน', 'เนื้อหา (5)', 'วิทยากร (5)', 'สถานที่ (5)', 'ภาพรวม (5)', 'ข้อเสนอแนะเพิ่มเติม'];
                const headerRow = worksheet.addRow(headers);
                headerRow.eachCell((cell) => {
                    cell.font = { name: 'Sarabun', size: 11, bold: true, color: { argb: 'FFFFFFFF' } };
                    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF0284C7' } }; // Blue-600
                    cell.alignment = { vertical: 'middle', horizontal: 'center' };
                    cell.border = { top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'} };
                });

                evaluations.forEach((r, index) => {
                    const row = worksheet.addRow([
                        index + 1,
                        r.name || 'ไม่ประสงค์ออกนาม',
                        r.scoreContent,
                        r.scoreSpeaker,
                        r.scoreVenue,
                        r.scoreOverall,
                        r.suggestion || '-'
                    ]);

                    row.eachCell((cell, colNumber) => {
                        cell.font = { name: 'Sarabun', size: 11 };
                        cell.alignment = { vertical: 'middle', horizontal: [1, 3,4,5,6].includes(colNumber) ? 'center' : 'left' };
                        cell.border = { top: {style:'thin', color:{argb:'FFCBD5E1'}}, left: {style:'thin', color:{argb:'FFCBD5E1'}}, bottom: {style:'thin', color:{argb:'FFCBD5E1'}}, right: {style:'thin', color:{argb:'FFCBD5E1'}} };
                        if (index % 2 === 1) cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF8FAFC' } };
                    });
                });

                worksheet.columns = [
                    { width: 8 }, { width: 25 }, { width: 12 }, { width: 12 }, { width: 12 }, { width: 12 }, { width: 50 }
                ];

                const buffer = await workbook.xlsx.writeBuffer();
                const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                saveAs(blob, `สรุปแบบประเมินอบรม_${new Date().toISOString().slice(0, 10)}.xlsx`);
            };

            const filteredRecords = evaluations.filter(r => 
                (r.name || '').toLowerCase().includes(searchTerm.toLowerCase()) || 
                (r.suggestion || '').toLowerCase().includes(searchTerm.toLowerCase())
            );

            // --- หน้าฟอร์มแบบประเมินสำหรับลูกค้า ---
            if (view === 'form') {
                return (
                    <div className="min-h-screen bg-[#f8fafc] py-10 px-4">
                        <div className="max-w-xl mx-auto">
                            {submitted ? (
                                <div className="bg-white p-12 rounded-[32px] shadow-xl text-center border border-slate-100 animate-in zoom-in duration-500">
                                    <div className="text-6xl mb-6">🙏</div>
                                    <h2 className="text-2xl font-extrabold mb-2 text-slate-800">ขอบคุณสำหรับคำติชมครับ</h2>
                                    <p className="text-slate-500 mb-8 font-medium">ทุกความคิดเห็นของคุณอภิชิตและทีมงานจะนำไปพัฒนาให้ดียิ่งขึ้นครับ</p>
                                </div>
                            ) : (
                                <div className="bg-white rounded-[32px] shadow-xl border border-slate-100 overflow-hidden">
                                    <div className="bg-slate-900 p-8 text-center relative overflow-hidden">
                                        <div className="absolute top-0 right-0 p-8 opacity-10 text-6xl">📝</div>
                                        <h1 className="text-2xl font-extrabold text-white mb-2 relative z-10">แบบประเมินความพึงพอใจ</h1>
                                        <p className="text-sm text-slate-300 relative z-10">งานอบรม: ความเสี่ยงรอบด้าน คุ้มครองรอบตัว</p>
                                    </div>
                                    
                                    <div className="p-8 md:p-10">
                                        {errorMsg && <div className="mb-6 p-4 bg-rose-50 text-rose-700 rounded-2xl text-[13px] font-bold">⚠️ {errorMsg}</div>}
                                        
                                        <form onSubmit={handleSubmitEvaluation}>
                                            <div className="mb-8">
                                                <label className="text-[13px] font-bold text-slate-500 uppercase tracking-widest ml-1 mb-2 block">ชื่อ - นามสกุล (ไม่ระบุได้)</label>
                                                <input 
                                                    type="text" 
                                                    placeholder="กรอกชื่อของคุณ (Optional)" 
                                                    className="w-full px-5 py-3.5 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all font-semibold"
                                                    value={formData.name}
                                                    onChange={e => setFormData({...formData, name: e.target.value})}
                                                />
                                            </div>

                                            <div className="space-y-2 mb-8">
                                                <h3 className="text-lg font-black text-slate-800 border-b pb-2 mb-4">ส่วนที่ 1: ให้คะแนนความพึงพอใจ</h3>
                                                <RatingRow label="📚 1. ความมีประโยชน์ของเนื้อหาการอบรม" value={formData.scoreContent} onChange={v => setFormData({...formData, scoreContent: v})} />
                                                <RatingRow label="🎤 2. ความรู้และการถ่ายทอดของวิทยากร" value={formData.scoreSpeaker} onChange={v => setFormData({...formData, scoreSpeaker: v})} />
                                                <RatingRow label="🏢 3. ความเหมาะสมของสถานที่และอาหาร" value={formData.scoreVenue} onChange={v => setFormData({...formData, scoreVenue: v})} />
                                                <RatingRow label="🌟 4. ความพึงพอใจโดยรวมต่องานนี้" value={formData.scoreOverall} onChange={v => setFormData({...formData, scoreOverall: v})} />
                                            </div>

                                            <div className="mb-8">
                                                <h3 className="text-lg font-black text-slate-800 border-b pb-2 mb-4">ส่วนที่ 2: ข้อเสนอแนะ</h3>
                                                <textarea 
                                                    rows="4" 
                                                    placeholder="พิมพ์คำแนะนำ หรือสิ่งที่อยากให้จัดในครั้งต่อไป..." 
                                                    className="w-full px-5 py-4 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all text-sm font-medium resize-none"
                                                    value={formData.suggestion}
                                                    onChange={e => setFormData({...formData, suggestion: e.target.value})}
                                                ></textarea>
                                            </div>

                                            <button type="submit" disabled={loading} className="w-full py-5 bg-slate-900 text-white rounded-[20px] font-black text-[18px] shadow-xl hover:bg-slate-800 hover:-translate-y-0.5 transition-all">
                                                {loading ? "กำลังส่งข้อมูล..." : "ส่งแบบประเมิน"}
                                            </button>
                                        </form>

                                        <div className="mt-8 text-center">
                                            <button onClick={() => setView('login')} className="text-slate-300 hover:text-slate-500 text-[10px] tracking-widest uppercase font-bold transition-colors">Admin Dashboard</button>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            // --- หน้าจอล็อกอินแอดมิน ---
            if (view === 'login') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 admin-gradient text-white">
                        <div className="w-full max-w-sm bg-white/10 backdrop-blur-xl p-8 rounded-3xl border border-white/20 shadow-2xl">
                            <h2 className="text-2xl font-bold mb-6 text-center italic">Evaluation Admin</h2>
                            {errorMsg && <div className="mb-6 p-3 bg-red-500/20 text-red-200 rounded-xl text-sm font-bold text-center">{errorMsg}</div>}
                            <form onSubmit={handleAdminLogin} className="space-y-4">
                                <input type="text" placeholder="Username" required className="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 outline-none focus:border-white/40" value={username} onChange={e => setUsername(e.target.value)} />
                                <input type="password" placeholder="Password" required className="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 outline-none focus:border-white/40" value={password} onChange={e => setPassword(e.target.value)} />
                                <button type="submit" className="w-full py-4 bg-white text-slate-900 rounded-xl font-bold">เข้าสู่ระบบ</button>
                                <button type="button" onClick={() => setView('form')} className="w-full text-white/40 text-xs mt-4 hover:text-white">กลับหน้าแบบประเมิน</button>
                            </form>
                        </div>
                    </div>
                );
            }

            // --- หน้า Dashboard แอดมินดูผล ---
            if (user && !user.isAnonymous && view === 'admin') {
                return (
                    <div className="min-h-screen bg-[#f1f5f9] font-sans pb-12">
                        <nav className="bg-white border-b px-6 py-4 sticky top-0 z-30 flex justify-between items-center shadow-sm">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-blue-600 text-white rounded-xl flex items-center justify-center font-black text-xl">⭐</div>
                                <div>
                                    <h1 className="text-lg font-extrabold text-slate-800 tracking-tight">Evaluation Results</h1>
                                    <p className="text-[11px] text-slate-400 font-bold uppercase">Workspace for Khun Apichit</p>
                                </div>
                            </div>
                            <button onClick={() => firebase.auth().signOut()} className="text-sm font-bold text-slate-500 hover:text-red-600">ออกจากระบบ</button>
                        </nav>

                        <div className="max-w-7xl mx-auto px-4 mt-8">
                            <div className="mb-6 flex justify-between items-end">
                                <div>
                                    <h2 className="text-2xl font-black text-slate-800">สรุปผลแบบประเมิน</h2>
                                    <p className="text-sm text-slate-500">จำนวนผู้ตอบแบบประเมินทั้งหมด: {evaluations.length} ท่าน</p>
                                </div>
                                <button onClick={exportExcel} className="hidden md:flex items-center gap-2 bg-blue-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-lg hover:bg-blue-700">
                                    โหลด Excel
                                </button>
                            </div>

                            {/* Chart Card */}
                            <div className="bg-white rounded-[24px] p-6 md:p-8 shadow-sm border border-slate-100 mb-8">
                                <h3 className="text-sm font-extrabold text-slate-500 uppercase tracking-widest mb-6">กราฟคะแนนเฉลี่ยรายหัวข้อ (เต็ม 5)</h3>
                                {errorMsg && <div className="mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm">{errorMsg}</div>}
                                {evaluations.length > 0 ? (
                                    <div className="chart-container"><canvas ref={chartRef}></canvas></div>
                                ) : (
                                    <div className="h-[250px] flex items-center justify-center text-slate-400 font-bold">ยังไม่มีข้อมูลประเมิน</div>
                                )}
                            </div>

                            {/* Search & Feedback Table */}
                            <div className="bg-white rounded-[24px] shadow-sm border border-slate-200 overflow-hidden">
                                <div className="p-4 border-b border-slate-100 flex justify-between items-center">
                                    <input 
                                        type="text" 
                                        placeholder="ค้นหาชื่อ หรือ ข้อเสนอแนะ..." 
                                        className="w-full max-w-md px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                        value={searchTerm}
                                        onChange={e => setSearchTerm(e.target.value)}
                                    />
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse">
                                        <thead className="bg-slate-50/80 border-b border-slate-200">
                                            <tr>
                                                <th className="py-4 px-6 text-[11px] font-extrabold text-slate-500 uppercase">ผู้ให้คะแนน</th>
                                                <th className="py-4 px-4 text-[11px] font-extrabold text-slate-500 uppercase text-center">เนื้อหา</th>
                                                <th className="py-4 px-4 text-[11px] font-extrabold text-slate-500 uppercase text-center">วิทยากร</th>
                                                <th className="py-4 px-4 text-[11px] font-extrabold text-slate-500 uppercase text-center">สถานที่</th>
                                                <th className="py-4 px-4 text-[11px] font-extrabold text-slate-500 uppercase text-center">ภาพรวม</th>
                                                <th className="py-4 px-6 text-[11px] font-extrabold text-slate-500 uppercase">ข้อเสนอแนะ</th>
                                                <th className="py-4 px-6 text-[11px] font-extrabold text-slate-500 uppercase text-right">จัดการ</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {filteredRecords.map(r => (
                                                <tr key={r.id} className="hover:bg-slate-50/60 group transition-colors">
                                                    <td className="py-4 px-6 font-bold text-sm text-slate-800">{r.name || <span className="text-slate-400 italic">ไม่ประสงค์ออกนาม</span>}</td>
                                                    <td className="py-4 px-4 text-center font-bold text-blue-600">{r.scoreContent}</td>
                                                    <td className="py-4 px-4 text-center font-bold text-amber-500">{r.scoreSpeaker}</td>
                                                    <td className="py-4 px-4 text-center font-bold text-pink-500">{r.scoreVenue}</td>
                                                    <td className="py-4 px-4 text-center font-bold text-emerald-500">{r.scoreOverall}</td>
                                                    <td className="py-4 px-6 text-sm text-slate-600">{r.suggestion || '-'}</td>
                                                    <td className="py-4 px-6 text-right">
                                                        <button onClick={() => handleDelete(r.id)} className="w-8 h-8 inline-flex items-center justify-center rounded-lg text-slate-400 hover:bg-rose-50 hover:text-rose-600 transition-all opacity-0 group-hover:opacity-100">
                                                            🗑️
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                            {filteredRecords.length === 0 && (
                                                <tr><td colSpan="7" className="py-8 text-center text-slate-400 font-bold">ไม่พบข้อมูล</td></tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }
            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
